<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放置修仙 - 完整版</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ink-black: #0d0d0d;
            --paper-color: #e6e1d3;
            --gold-accent: #d4af37;
            --jade-green: #3a5a40;
            --vermilion: #8b0000;
            --mist-white: rgba(255, 255, 255, 0.05);
            --bg-primary: var(--ink-black);
            --text-primary: #333;
            --text-on-dark: #d4d4d4;
            --accent: var(--gold-accent);
            --danger: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-primary);
            color: var(--text-on-dark);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .mist-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.1; pointer-events: none; z-index: 0;
        }

        /* ========== 卷轴容器 ========== */
        #scroll-container {
            position: relative; width: 95%; max-width: 1300px; min-height: 85vh;
            margin: 30px auto; display: flex; z-index: 10;
        }

        .scroll-rod {
            width: 40px;
            background: linear-gradient(to right, #4a3728, #7a5c48 50%, #4a3728);
            border-radius: 5px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            position: relative; flex-shrink: 0;
        }
        .scroll-rod::before, .scroll-rod::after {
            content: ''; position: absolute; left: -5px;
            width: 50px; height: 50px;
            background: radial-gradient(circle, var(--gold-accent), #8b7355);
            border-radius: 50%; border: 2px solid #4a3728;
        }
        .scroll-rod::before { top: -25px; }
        .scroll-rod::after { bottom: -25px; }

        .scroll-paper {
            background-color: var(--paper-color);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            flex: 1; padding: 30px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2), 10px 10px 30px rgba(0,0,0,0.5);
            border-left: 2px solid #ccc; border-right: 2px solid #ccc;
            display: grid; grid-template-columns: 320px 1fr; gap: 30px;
            color: var(--text-primary); overflow-y: auto; max-height: 90vh;
        }

        /* ========== 左侧：角色区 ========== */
        #char-display-area {
            display: flex; flex-direction: column; align-items: center;
            border-right: 1px solid rgba(0,0,0,0.1); padding-right: 20px;
        }

        .avatar-frame {
            width: 200px; height: 200px;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjA4IiBoZWlnaHQ9IjIwOCIgdmlld0JveD0iMCAwIDIwOCAyMDgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMTA0IiBjeT0iMTA0IiByPSIxMDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2Q0YWYzNyIgc3Ryb2tlLXdpZHRoPSI0Ii8+PC9zdmc+');
            background-size: contain; display: flex; align-items: center; justify-content: center;
            position: relative; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
        }
        .avatar-img {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; border: 3px double var(--gold-accent);
        }

        .realm-badge {
            font-family: 'Ma Shan Zheng', cursive; font-size: 2em;
            color: var(--vermilion); margin-top: 12px;
            border-bottom: 2px solid var(--vermilion); padding: 0 18px;
        }
        .char-name {
            font-family: 'Ma Shan Zheng', cursive; font-size: 1.6em;
            margin: 8px 0; letter-spacing: 4px;
        }

        .stats-grid {
            width: 100%; margin-top: 15px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .stat-tag {
            background: rgba(139,0,0,0.06); border: 1px solid rgba(139,0,0,0.12);
            padding: 7px 10px; display: flex; justify-content: space-between;
            font-size: 0.88em; border-radius: 2px;
        }
        .stat-tag .val { color: var(--vermilion); font-weight: bold; }

        .progress-ink-container {
            width: 100%; height: 12px; background: rgba(0,0,0,0.08);
            border-radius: 6px; overflow: hidden; margin: 5px 0;
        }
        .progress-ink-fill {
            height: 100%; background: var(--vermilion);
            transition: width 0.3s; box-shadow: 0 0 8px rgba(139,0,0,0.4);
        }

        /* ========== 右侧：内容区 ========== */
        #content-area { display: flex; flex-direction: column; gap: 15px; }

        .section-header {
            font-family: 'Ma Shan Zheng', cursive; font-size: 1.4em;
            border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .resource-bar {
            display: flex; gap: 20px; background: rgba(0,0,0,0.05);
            padding: 10px 18px; border-radius: 5px; margin-bottom: 8px;
        }
        .resource-item { font-weight: bold; color: var(--jade-green); font-size: 1.05em; }
        .resource-item i { margin-right: 4px; }

        /* 按钮 */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .main-btn {
            background: #fff;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            border: 2px solid #555; padding: 18px 15px;
            font-family: 'Ma Shan Zheng', cursive; font-size: 1.3em;
            cursor: pointer; transition: all 0.3s; position: relative;
            box-shadow: 3px 3px 0px #333; text-align: center;
        }
        .main-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0px var(--vermilion); border-color: var(--vermilion); color: var(--vermilion); }
        .main-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0px #333; }
        .main-btn .hint { font-size: 0.55em; margin-top: 4px; opacity: 0.7; }

        .btn-small {
            width: 100%; padding: 8px; margin-top: 8px;
            background: rgba(0,0,0,0.05); border: 1px solid #999;
            border-radius: 4px; cursor: pointer; font-family: inherit;
            font-size: 0.9em; transition: all 0.2s;
        }
        .btn-small:hover { background: var(--vermilion); color: #fff; border-color: var(--vermilion); }

        /* 战斗 */
        .enemy-card {
            display: flex; gap: 15px; align-items: center;
            background: rgba(0,0,0,0.05); padding: 12px 15px; border-radius: 5px;
        }
        .enemy-avatar { font-size: 2.5em; }
        .enemy-info { flex: 1; }

        .battle-log {
            background: rgba(255,255,255,0.6); border: 1px solid #ddd;
            height: 120px; overflow-y: auto; padding: 10px;
            font-size: 0.85em; line-height: 1.7; border-radius: 5px; margin-top: 8px;
        }
        .battle-msg { padding: 2px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* 底部导航（玉佩样式） */
        #bottom-selector {
            display: flex; justify-content: center; gap: 12px; margin-top: 15px; flex-wrap: wrap;
        }
        .nav-talisman {
            min-width: 70px; padding: 10px 14px;
            background: #fff; border: 1px solid #555;
            font-family: 'Ma Shan Zheng', cursive; font-size: 1.1em;
            cursor: pointer; transition: all 0.3s; text-align: center;
            clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
        }
        .nav-talisman:hover, .nav-talisman.active {
            background: var(--vermilion); color: #fff; border-color: var(--gold-accent);
        }

        /* ========== 模态框（国风） ========== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--paper-color);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            padding: 25px 30px; width: 92%; max-width: 580px;
            border: 4px double #4a3728; max-height: 80vh; overflow-y: auto;
            color: var(--text-primary); border-radius: 4px;
        }
        .modal-close {
            float: right; font-size: 1.8em; cursor: pointer; color: #999;
            line-height: 1;
        }
        .modal-close:hover { color: var(--vermilion); }

        /* 面板列表项 */
        .panel-list-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: rgba(0,0,0,0.04);
            border-radius: 5px; margin-bottom: 7px; font-size: 0.92em;
            transition: background 0.2s; cursor: pointer;
        }
        .panel-list-item:hover { background: rgba(139,0,0,0.08); }
        .panel-list-item .icon { font-size: 1.4em; min-width: 30px; text-align: center; }
        .panel-list-item .info { flex: 1; }
        .panel-list-item .name { font-weight: bold; }
        .panel-list-item .desc { font-size: 0.85em; color: #666; }
        .panel-list-item .action { color: var(--gold-accent); font-weight: bold; font-size: 0.9em; }

        /* 商店 */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 12px; margin-top: 15px; }
        .shop-item {
            background: rgba(0,0,0,0.04); padding: 15px 10px; border-radius: 6px;
            text-align: center; cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
        }
        .shop-item:hover { border-color: var(--gold-accent); transform: translateY(-2px); }
        .shop-item .item-icon { font-size: 2.5em; margin-bottom: 8px; }
        .shop-item .price { color: var(--gold-accent); font-weight: bold; font-size: 0.9em; }

        /* Toast */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .toast {
            padding: 12px 18px; background: var(--paper-color); color: var(--text-primary);
            border: 1px solid var(--gold-accent); border-radius: 6px;
            margin-bottom: 8px; animation: slideIn 0.3s ease; max-width: 300px;
            font-size: 0.95em; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        @keyframes slideIn { from { opacity:0; transform: translateX(80px); } to { opacity:1; transform:translateX(0); } }

        /* 浮动文字 */
        @keyframes floatUp { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-50px); } }
        .floating-text {
            position: absolute; animation: floatUp 1s ease forwards;
            font-weight: bold; pointer-events: none; z-index: 10;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .scroll-paper { grid-template-columns: 1fr; }
            #char-display-area { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; padding-right: 0; margin-bottom: 15px; }
            .scroll-rod { width: 100%; height: 30px; background: linear-gradient(to bottom, #4a3728, #7a5c48 50%, #4a3728); }
            .scroll-rod::before { top: -5px; left: -20px; width: 40px; height: 40px; }
            .scroll-rod::after { bottom: auto; top: -5px; right: -20px; left: auto; width: 40px; height: 40px; }
            #scroll-container { flex-direction: column; }
            .action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="mist-overlay"></div>

    <div id="game-root">
        <div id="scroll-container">
            <!-- 左卷轴 -->
            <div class="scroll-rod"></div>

            <div class="scroll-paper">
                <!-- ======= 左侧：角色展示 ======= -->
                <aside id="char-display-area">
                    <div class="avatar-frame">
                        <img class="avatar-img" src="avatar.png" alt="修仙者头像">
                    </div>
                    <div class="realm-badge" id="realm">凡人</div>
                    <div class="char-name" id="char-name">修行者</div>

                    <div style="width:100%; margin: 8px 0;">
                        <div style="display:flex; justify-content:space-between; font-size:0.78em; margin-bottom:2px;">
                            <span>灵力进度</span>
                            <span id="exp-text">0/100</span>
                        </div>
                        <div class="progress-ink-container">
                            <div class="progress-ink-fill" id="exp-fill" style="width:0%"></div>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-tag"><span><i class="fas fa-heart" style="color:#c0392b;"></i> 生命</span><span class="val" id="stat-hp">100</span></div>
                        <div class="stat-tag"><span><i class="fas fa-crosshairs" style="color:#555;"></i> 攻击</span><span class="val" id="stat-atk">10</span></div>
                        <div class="stat-tag"><span><i class="fas fa-shield-alt" style="color:#555;"></i> 防御</span><span class="val" id="stat-def">5</span></div>
                        <div class="stat-tag"><span><i class="fas fa-bolt" style="color:#f39c12;"></i> 速度</span><span class="val" id="stat-spd">10</span></div>
                        <div class="stat-tag"><span><i class="fas fa-clover" style="color:#27ae60;"></i> 幸运</span><span class="val" id="stat-luck">1</span></div>
                        <div class="stat-tag"><span><i class="fas fa-star" style="color:#f39c12;"></i> 悟性</span><span class="val" id="stat-comp">1</span></div>
                    </div>

                    <button class="btn-small" id="assign-stats-btn">
                        分配点数（剩余 <span id="free-points-num">0</span> 点）
                    </button>
                </aside>

                <!-- ======= 右侧：交互区 ======= -->
                <section id="content-area">
                    <!-- 资源栏 -->
                    <div class="resource-bar">
                        <div class="resource-item"><i class="fas fa-coins"></i> <span id="gold">0</span></div>
                        <div class="resource-item"><i class="fas fa-gem"></i> <span id="gem">0</span></div>
                        <div class="resource-item"><i class="fas fa-bolt"></i> <span id="energy">100/100</span></div>
                        <div class="resource-item" style="margin-left:auto; font-size:0.85em; color:#888;" id="save-status">已保存</div>
                    </div>

                    <!-- 修炼面板 -->
                    <div id="tab-cultivation">
                        <div class="section-header">仙路修行</div>
                        <div class="action-grid">
                            <button class="main-btn" id="cultivate-btn">
                                <i class="fas fa-leaf" style="display:block;font-size:1.6em;"></i>
                                修炼
                                <div class="hint">点击吐纳灵气</div>
                            </button>
                            <button class="main-btn" id="auto-cultivate-btn">
                                <i class="fas fa-sync" style="display:block;font-size:1.6em;"></i>
                                闭关
                                <div class="hint" id="auto-status">未开启</div>
                            </button>
                        </div>

                        <!-- 战斗 -->
                        <div class="section-header" style="margin-top:25px;">历练挑战</div>
                        <div class="enemy-card">
                            <div class="enemy-avatar" id="enemy-emoji"><i class="fas fa-paw"></i></div>
                            <div class="enemy-info">
                                <div id="enemy-name" style="font-weight:bold;">灰狼</div>
                                <div class="progress-ink-container">
                                    <div class="progress-ink-fill" id="enemy-hp-fill" style="width:100%"></div>
                                </div>
                                <div id="enemy-hp-text" style="font-size:0.8em; text-align:right;">50/50</div>
                            </div>
                        </div>
                        <button class="main-btn" id="battle-btn" style="margin-top:10px; grid-column: 1/-1;">
                            <i class="fas fa-crosshairs" style="display:block;font-size:1.4em;"></i>
                            斩妖除魔
                        </button>
                        <div class="battle-log" id="battle-log">
                            <div class="battle-msg">欢迎来到放置修仙世界，道友。</div>
                        </div>
                    </div>

                    <!-- 底部导航 -->
                    <div id="bottom-selector">
                        <div class="nav-talisman active" data-tab="cultivation">修行</div>
                        <div class="nav-talisman" data-tab="skills">神通</div>
                        <div class="nav-talisman" data-tab="inventory">宝库</div>
                        <div class="nav-talisman" data-tab="achievements">功德</div>
                        <div class="nav-talisman" data-tab="shop">灵坊</div>
                        <div class="nav-talisman" data-tab="settings">仙机</div>
                    </div>
                </section>
            </div>

            <!-- 右卷轴 -->
            <div class="scroll-rod"></div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <script>
    // ==================== 配置 ====================
    const CONFIG = {
        SAVE_KEY: 'cultivation_save',       // 与单文件版一致，继承存档
        SAVE_INTERVAL: 30000,
        AUTO_CULTIVATE_INTERVAL: 1000,
        OFFLINE_MAX_HOURS: 8,
        ENERGY_REGEN_RATE: 5,
        BATTLE_TICK: 1000,
    };

    // ==================== 数据定义 ====================
    const REALMS = [
        { name: '凡人', level: 1, color: '#888' },
        { name: '练气期', level: 5, color: '#64ffda' },
        { name: '筑基期', level: 10, color: '#3498db' },
        { name: '金丹期', level: 20, color: '#9b59b6' },
        { name: '元婴期', level: 35, color: '#e74c3c' },
        { name: '化神期', level: 50, color: '#ffd700' },
        { name: '炼虚期', level: 70, color: '#ff6b6b' },
        { name: '合体期', level: 90, color: '#1abc9c' },
        { name: '大乘期', level: 120, color: '#a8e6cf' },
        { name: '渡劫期', level: 150, color: '#f1c40f' },
        { name: '仙人', level: 200, color: '#ffffff' },
    ];

    const SKILLS = [
        { id:'fireball', name:'火球术', icon:'<i class="fas fa-fire"></i>', desc:'发射火球攻击敌人', maxLevel:10, cost:l=>l*100, effect:l=>l*5, type:'attack' },
        { id:'heal', name:'治愈术', icon:'<i class="fas fa-heart"></i>', desc:'恢复生命值', maxLevel:10, cost:l=>l*80, effect:l=>l*10, type:'heal' },
        { id:'meditation', name:'冥想', icon:'<i class="fas fa-leaf"></i>', desc:'提升修炼速度', maxLevel:10, cost:l=>l*120, effect:l=>1+l*0.1, type:'cultivation' },
        { id:'strength', name:'力量强化', icon:'<i class="fas fa-dumbbell"></i>', desc:'永久提升攻击力', maxLevel:10, cost:l=>l*150, effect:l=>l*3, type:'passive' },
        { id:'shield', name:'护盾术', icon:'<i class="fas fa-shield-alt"></i>', desc:'永久提升防御力', maxLevel:10, cost:l=>l*130, effect:l=>l*2, type:'passive' },
        { id:'double_exp', name:'双倍经验', icon:'<i class="fas fa-star"></i>', desc:'修炼获得双倍经验', maxLevel:5, cost:l=>l*500, effect:l=>1+l*0.5, type:'cultivation' },
    ];

    const ENEMIES = [
        { id:'wolf', name:'灰狼', icon:'<i class="fas fa-paw"></i>', hp:50, atk:8, def:2, exp:20, gold:10 },
        { id:'boar', name:'野猪', icon:'<i class="fas fa-paw"></i>', hp:80, atk:12, def:5, exp:35, gold:20 },
        { id:'snake', name:'毒蛇', icon:'<i class="fas fa-staff-snake"></i>', hp:40, atk:15, def:1, exp:25, gold:15 },
        { id:'bear', name:'棕熊', icon:'<i class="fas fa-paw"></i>', hp:150, atk:20, def:10, exp:60, gold:40 },
        { id:'tiger', name:'猛虎', icon:'<i class="fas fa-paw"></i>', hp:200, atk:30, def:15, exp:100, gold:70 },
        { id:'dragon', name:'幼龙', icon:'<i class="fas fa-dragon"></i>', hp:500, atk:50, def:30, exp:300, gold:200 },
    ];

    const ITEMS = [
        { id:'potion_hp', name:'生命药水', icon:'<i class="fas fa-flask"></i>', desc:'恢复50点生命值', type:'consumable', effect:'heal_50' },
        { id:'potion_energy', name:'能量药水', icon:'<i class="fas fa-bolt"></i>', desc:'恢复50点能量', type:'consumable', effect:'energy_50' },
        { id:'scroll_exp', name:'经验卷轴', icon:'<i class="fas fa-scroll"></i>', desc:'获得100点经验', type:'consumable', effect:'exp_100' },
        { id:'gem_box', name:'宝石盒', icon:'<i class="fas fa-gem"></i>', desc:'获得10颗宝石', type:'consumable', effect:'gem_10' },
        { id:'sword', name:'铁剑', icon:'<i class="fas fa-sword"></i>', desc:'攻击力+5', type:'equipment', effect:'atk_5', slot:'weapon' },
        { id:'armor', name:'布甲', icon:'<i class="fas fa-vest"></i>', desc:'防御力+3', type:'equipment', effect:'def_3', slot:'armor' },
    ];

    const SHOP_ITEMS = [
        { id:'potion_hp', name:'生命药水', price:50, currency:'gold' },
        { id:'potion_energy', name:'能量药水', price:100, currency:'gold' },
        { id:'scroll_exp', name:'经验卷轴', price:200, currency:'gold' },
        { id:'gem_box', name:'宝石盒', price:10, currency:'gem' },
        { id:'sword', name:'铁剑', price:500, currency:'gold' },
        { id:'armor', name:'布甲', price:400, currency:'gold' },
    ];

    const ACHIEVEMENTS = [
        { id:'first_cultivate', name:'初入仙途', desc:'首次修炼', icon:'<i class="fas fa-seedling"></i>', condition:s=>s.stats.totalCultivations>=1, reward:{gold:50} },
        { id:'level_10', name:'小有成就', desc:'达到10级', icon:'<i class="fas fa-award"></i>', condition:s=>s.level>=10, reward:{gold:500,gem:5} },
        { id:'level_50', name:'一方强者', desc:'达到50级', icon:'<i class="fas fa-crown"></i>', condition:s=>s.level>=50, reward:{gold:5000,gem:50} },
        { id:'first_battle', name:'初试锋芒', desc:'首次战斗', icon:'<i class="fas fa-crosshairs"></i>', condition:s=>s.stats.totalBattles>=1, reward:{gold:30} },
        { id:'win_10', name:'战斗新手', desc:'胜利10场', icon:'<i class="fas fa-trophy"></i>', condition:s=>s.stats.totalWins>=10, reward:{gold:200} },
        { id:'win_100', name:'战斗大师', desc:'胜利100场', icon:'<i class="fas fa-trophy" style="color:#f39c12;"></i>', condition:s=>s.stats.totalWins>=100, reward:{gold:2000,gem:20} },
        { id:'gold_1000', name:'小富即安', desc:'累计获得1000金币', icon:'<i class="fas fa-coins"></i>', condition:s=>s.stats.totalGold>=1000, reward:{gem:10} },
        { id:'learn_skill', name:'技能初悟', desc:'学会第一个技能', icon:'<i class="fas fa-book-open"></i>', condition:s=>Object.values(s.skills).some(v=>v>0), reward:{gold:100} },
        { id:'all_skills_5', name:'技能精通', desc:'所有技能达到5级', icon:'<i class="fas fa-gem"></i>', condition:s=>SKILLS.every(sk=>(s.skills[sk.id]||0)>=5), reward:{gold:5000,gem:30} },
    ];

    // ==================== 游戏状态 ====================
    let gameState = {
        level:1, exp:0, expToNext:100, realm:'凡人',
        gold:0, gem:0, energy:100, maxEnergy:100,
        hp:100, maxHp:100, atk:10, def:5, spd:10, luck:1, comprehension:1,
        freePoints:0, skills:{}, equipment:{weapon:null,armor:null},
        inventory:{}, achievements:[],
        currentEnemy:null, enemyHp:0, autoCultivate:false,
        stats:{
            totalCultivations:0, totalBattles:0, totalWins:0,
            totalGold:0, totalExp:0, totalDeaths:0,
            startTime:Date.now(), lastSaveTime:Date.now(), lastOnlineTime:Date.now(),
        },
        settings:{ sound:true, autoSave:true, animations:true },
    };

    // ==================== 游戏核心 ====================
    class Game {
        constructor() { this.init(); }

        init() {
            this.loadGame();
            this.bindEvents();
            this.startLoops();
            this.checkOfflineEarnings();
            this.updateUI();
        }

        // --- 存档 ---
        loadGame() {
            const saved = localStorage.getItem(CONFIG.SAVE_KEY);
            if (saved) {
                try { gameState = this.mergeDeep(gameState, JSON.parse(saved)); }
                catch(e) { console.error('加载失败', e); }
            }
        }
        saveGame() {
            try {
                gameState.stats.lastSaveTime = Date.now();
                localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(gameState));
                this.showToast('游戏已保存', 'success');
                document.getElementById('save-status').textContent = '已保存 ' + new Date().toLocaleTimeString();
            } catch(e) { this.showToast('保存失败', 'error'); }
        }
        mergeDeep(target, source) {
            const out = {...target};
            if (this.isObj(target) && this.isObj(source)) {
                Object.keys(source).forEach(k => {
                    out[k] = this.isObj(source[k]) && k in target ? this.mergeDeep(target[k], source[k]) : source[k];
                });
            }
            return out;
        }
        isObj(i) { return i && typeof i==='object' && !Array.isArray(i); }

        // --- 离线收益 ---
        checkOfflineEarnings() {
            const last = gameState.stats.lastOnlineTime;
            const now = Date.now();
            const offSec = (now - last) / 1000;
            if (offSec > 60 && gameState.autoCultivate) {
                const maxSec = CONFIG.OFFLINE_MAX_HOURS * 3600;
                const effSec = Math.min(offSec, maxSec);
                const mins = Math.floor(effSec / 60);
                const base = 10 * this.getCultivationMultiplier();
                const expGain = Math.floor(base * mins * 0.5);
                const goldGain = Math.floor(expGain * 0.3);
                if (expGain > 0) {
                    this.gainExp(expGain);
                    this.gainGold(goldGain);
                    this.showToast(`离线收益: ${expGain}经验, ${goldGain}金币`, 'success');
                }
            }
            gameState.stats.lastOnlineTime = now;
        }
        getCultivationMultiplier() {
            let m = 1;
            const ml = gameState.skills['meditation']||0;
            if (ml>0) m *= SKILLS.find(s=>s.id==='meditation').effect(ml);
            const dl = gameState.skills['double_exp']||0;
            if (dl>0) m *= SKILLS.find(s=>s.id==='double_exp').effect(dl);
            return m;
        }

        // --- 修炼 ---
        cultivate() {
            if (gameState.energy <= 0) { this.showToast('体力耗尽', 'warning'); return; }
            gameState.energy = Math.max(0, gameState.energy-1);
            gameState.stats.totalCultivations++;
            const gain = Math.floor(10 * this.getCultivationMultiplier());
            this.gainExp(gain);
            if (Math.random()<0.3) this.gainGold(Math.floor(Math.random()*5)+1);
            this.showFloatingText(`+${gain} EXP`, '#64ffda');
            this.updateUI();
        }

        gainExp(amt) {
            gameState.exp += amt;
            gameState.stats.totalExp += amt;
            while (gameState.exp >= gameState.expToNext) {
                gameState.exp -= gameState.expToNext;
                this.levelUp();
            }
            this.updateUI();
        }

        levelUp() {
            gameState.level++;
            gameState.freePoints += 2;
            gameState.expToNext = Math.floor(gameState.expToNext * 1.5);
            gameState.maxHp += 10;
            gameState.hp = gameState.maxHp;
            gameState.atk += 2;
            gameState.def += 1;
            gameState.spd += 1;
            if (gameState.level%5===0) { gameState.maxEnergy+=20; gameState.energy=gameState.maxEnergy; }
            this.updateRealm();
            this.showLevelUpAnim();
            this.showToast(`升级！等级 ${gameState.level}`, 'success');
            this.checkAchievements();
        }

        updateRealm() {
            let nr = REALMS[0].name;
            for (let i=REALMS.length-1; i>=0; i--) { if (gameState.level>=REALMS[i].level) { nr=REALMS[i].name; break; } }
            if (nr!==gameState.realm) { gameState.realm=nr; this.showToast(`突破至 ${nr}！`, 'success'); }
        }

        gainGold(amt) { gameState.gold+=amt; gameState.stats.totalGold+=amt; this.updateUI(); }

        // --- 战斗 ---
        startBattle() {
            if (gameState.currentEnemy) return;
            const idx = Math.min(Math.floor(gameState.level/10), ENEMIES.length-1);
            const tpl = ENEMIES[Math.min(idx, ENEMIES.length-1)];
            gameState.currentEnemy = {...tpl};
            gameState.enemyHp = tpl.hp;
            this.updateEnemyDisplay();
            this.showToast(`遭遇 ${tpl.name}！`, 'warning');
            this.autoBattle();
        }

        autoBattle() {
            if (!gameState.currentEnemy || gameState.currentEnemy.hp<=0) return;
            const iv = setInterval(()=>{
                if (!gameState.currentEnemy) { clearInterval(iv); return; }
                const pd = Math.max(1, gameState.atk - gameState.currentEnemy.def + Math.floor(Math.random()*5));
                gameState.currentEnemy.hp -= pd;
                this.addBattleLog(`对 ${gameState.currentEnemy.name} 造成 ${pd} 点伤害`);
                if (gameState.currentEnemy.hp<=0) { this.winBattle(); clearInterval(iv); return; }
                const ed = Math.max(1, gameState.currentEnemy.atk - gameState.def + Math.floor(Math.random()*3));
                gameState.hp -= ed;
                this.addBattleLog(`${gameState.currentEnemy.name} 对你造成 ${ed} 点伤害`);
                if (gameState.hp<=0) { this.loseBattle(); clearInterval(iv); return; }
                this.updateEnemyDisplay();
                this.updateUI();
            }, CONFIG.BATTLE_TICK);
        }

        winBattle() {
            gameState.stats.totalBattles++; gameState.stats.totalWins++;
            const e = gameState.currentEnemy;
            this.gainExp(e.exp); this.gainGold(e.gold);
            this.addBattleLog(`胜利！获得 ${e.exp} 经验, ${e.gold} 金币`);
            this.showToast('战斗胜利！', 'success');
            gameState.currentEnemy=null; this.updateEnemyDisplay(); this.checkAchievements();
        }
        loseBattle() {
            gameState.stats.totalBattles++; gameState.stats.totalDeaths++;
            gameState.hp = Math.floor(gameState.maxHp*0.1);
            this.addBattleLog('战斗失败...');
            this.showToast('战斗失败，生命恢复10%', 'error');
            gameState.currentEnemy=null; this.updateEnemyDisplay();
        }

        // --- UI 更新 ---
        updateUI() {
            document.getElementById('gold').textContent = gameState.gold;
            document.getElementById('gem').textContent = gameState.gem;
            document.getElementById('energy').textContent = `${gameState.energy}/${gameState.maxEnergy}`;
            document.getElementById('realm').textContent = gameState.realm;
            document.getElementById('stat-hp').textContent = gameState.maxHp;
            document.getElementById('stat-atk').textContent = gameState.atk;
            document.getElementById('stat-def').textContent = gameState.def;
            document.getElementById('stat-spd').textContent = gameState.spd;
            document.getElementById('stat-luck').textContent = gameState.luck;
            document.getElementById('stat-comp').textContent = gameState.comprehension;
            document.getElementById('free-points-num').textContent = gameState.freePoints;

            const pct = (gameState.exp / gameState.expToNext)*100;
            document.getElementById('exp-fill').style.width = pct+'%';
            document.getElementById('exp-text').textContent = `${gameState.exp}/${gameState.expToNext}`;

            document.getElementById('auto-status').textContent = gameState.autoCultivate?'闭关中...':'未开启';
        }

        updateEnemyDisplay() {
            if (!gameState.currentEnemy) {
                const idx = Math.min(Math.floor(gameState.level/10), ENEMIES.length-1);
                const e = ENEMIES[Math.min(idx, ENEMIES.length-1)];
                document.getElementById('enemy-emoji').innerHTML = e.icon;
                document.getElementById('enemy-name').textContent = e.name;
                document.getElementById('enemy-hp-fill').style.width = '100%';
                document.getElementById('enemy-hp-text').textContent = `${e.hp}/${e.hp}`;
            } else {
                const hpPct = (Math.max(0,gameState.currentEnemy.hp)/gameState.currentEnemy.hp)*100;
                document.getElementById('enemy-emoji').innerHTML = gameState.currentEnemy.icon;
                document.getElementById('enemy-name').textContent = gameState.currentEnemy.name;
                document.getElementById('enemy-hp-fill').style.width = hpPct+'%';
                document.getElementById('enemy-hp-text').textContent = `${Math.max(0,gameState.currentEnemy.hp)}/${gameState.currentEnemy.maxHp||gameState.currentEnemy.hp}`;
            }
        }

        // --- 技能 ---
        upgradeSkill(skillId) {
            const sk = SKILLS.find(s=>s.id===skillId);
            const lvl = gameState.skills[skillId]||0;
            if (lvl>=sk.maxLevel) { this.showToast('已满级', 'warning'); return; }
            const cost = sk.cost(lvl+1);
            if (gameState.gold<cost) { this.showToast('金币不足', 'warning'); return; }
            gameState.gold-=cost;
            gameState.skills[skillId]=lvl+1;
            if (sk.type==='passive') {
                if (skillId==='strength') gameState.atk+=sk.effect(1);
                if (skillId==='shield') gameState.def+=sk.effect(1);
            }
            this.showToast(`${sk.name} → Lv.${lvl+1}`, 'success');
            this.updateUI(); this.checkAchievements();
        }

        // --- 物品 ---
        buyItem(itemId) {
            const si = SHOP_ITEMS.find(i=>i.id===itemId);
            if (!si) return;
            if (si.currency==='gold'&&gameState.gold<si.price) { this.showToast('金币不足','warning'); return; }
            if (si.currency==='gem'&&gameState.gem<si.price) { this.showToast('宝石不足','warning'); return; }
            if (si.currency==='gold') gameState.gold-=si.price; else gameState.gem-=si.price;
            gameState.inventory[itemId] = (gameState.inventory[itemId]||0)+1;
            this.showToast(`购买成功`, 'success'); this.updateUI();
        }

        useItem(itemId) {
            if (!gameState.inventory[itemId]||gameState.inventory[itemId]<=0) return;
            const it = ITEMS.find(i=>i.id===itemId);
            if (!it) return;
            if (it.effect==='heal_50') gameState.hp=Math.min(gameState.maxHp,gameState.hp+50), this.showToast('生命+50','success');
            if (it.effect==='energy_50') gameState.energy=Math.min(gameState.maxEnergy,gameState.energy+50), this.showToast('能量+50','success');
            if (it.effect==='exp_100') this.gainExp(100), this.showToast('经验+100','success');
            if (it.effect==='gem_10') gameState.gem+=10, this.showToast('宝石+10','success');
            gameState.inventory[itemId]--;
            if (gameState.inventory[itemId]<=0) delete gameState.inventory[itemId];
            this.updateUI();
        }

        // --- 成就 ---
        checkAchievements() {
            ACHIEVEMENTS.forEach(a=>{
                if (!gameState.achievements.includes(a.id) && a.condition(gameState)) {
                    gameState.achievements.push(a.id);
                    if (a.reward.gold) this.gainGold(a.reward.gold);
                    if (a.reward.gem) gameState.gem+=a.reward.gem;
                    this.showToast(`成就解锁：${a.name}`, 'success');
                }
            });
        }

        // --- 分配属性点 ---
        assignStat(statId) {
            if (gameState.freePoints<1) return;
            gameState.freePoints--;
            if (statId==='hp') { gameState.maxHp+=20; gameState.hp+=20; }
            if (statId==='atk') gameState.atk+=2;
            if (statId==='def') gameState.def+=1;
            if (statId==='spd') gameState.spd+=1;
            if (statId==='luck') gameState.luck+=1;
            if (statId==='comp') gameState.comprehension+=1;
            this.showToast('属性提升', 'success'); this.updateUI(); this.showAssignModal();
        }

        // ==================== 模态框内容 ====================
        showModal(tab) {
            const ov = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            ov.style.display='flex';
            if (tab==='cultivation') { ov.style.display='none'; return; }
            if (tab==='skills') this.renderSkillsModal(body);
            if (tab==='inventory') this.renderInventoryModal(body);
            if (tab==='achievements') this.renderAchievementsModal(body);
            if (tab==='shop') this.renderShopModal(body);
            if (tab==='settings') this.renderSettingsModal(body);
        }

        renderSkillsModal(body) {
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">神通广大</h3>';
            SKILLS.forEach(sk=>{
                const lvl=gameState.skills[sk.id]||0;
                const cost=sk.cost(lvl+1);
                const canBuy=lvl<sk.maxLevel&&gameState.gold>=cost;
                const d=document.createElement('div');
                d.className='panel-list-item';
                d.innerHTML=`
                    <div class="icon">${sk.icon}</div>
                    <div class="info">
                        <div class="name">${sk.name} <span style="color:var(--gold-accent);">Lv.${lvl}/${sk.maxLevel}</span></div>
                        <div class="desc">${sk.desc}｜升级费用：${cost} 金币</div>
                    </div>
                    <div class="action" style="${canBuy?'':'opacity:0.4;'}">${lvl>=sk.maxLevel?'已满级':'升级'}</div>
                `;
                d.onclick=()=>this.upgradeSkill(sk.id);
                body.appendChild(d);
            });
        }

        renderInventoryModal(body) {
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">玲珑宝库</h3>';
            const entries=Object.entries(gameState.inventory);
            if (entries.length===0) { body.innerHTML+='<p style="color:#999;text-align:center;padding:20px;">宝库为空</p>'; return; }
            entries.forEach(([id,qty])=>{
                const it=ITEMS.find(i=>i.id===id); if(!it)return;
                const d=document.createElement('div');
                d.className='panel-list-item';
                d.innerHTML=`
                    <div class="icon">${it.icon}</div>
                    <div class="info"><div class="name">${it.name}</div><div class="desc">${it.desc}</div></div>
                    <div class="action">x${qty}｜使用</div>
                `;
                d.onclick=()=>this.useItem(id);
                body.appendChild(d);
            });
        }

        renderAchievementsModal(body) {
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">功德碑</h3>';
            ACHIEVEMENTS.forEach(a=>{
                const unlocked=gameState.achievements.includes(a.id);
                const d=document.createElement('div');
                d.className='panel-list-item';
                d.style.opacity=unlocked?'1':'0.45';
                d.style.border=unlocked?'1px solid var(--gold-accent)':'1px solid transparent';
                d.innerHTML=`
                    <div class="icon">${a.icon}</div>
                    <div class="info"><div class="name">${a.name}</div><div class="desc">${a.desc}</div></div>
                    <div class="action">${unlocked?'<span style="color:var(--gold-accent);">已解锁</span>':'未解锁'}</div>
                `;
                body.appendChild(d);
            });
        }

        renderShopModal(body) {
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">灵坊市集</h3>';
            const grid=document.createElement('div'); grid.className='shop-grid';
            SHOP_ITEMS.forEach(si=>{
                const it=ITEMS.find(i=>i.id===si.id);
                const canBuy=si.currency==='gold'?gameState.gold>=si.price:gameState.gem>=si.price;
                const d=document.createElement('div'); d.className='shop-item';
                d.innerHTML=`
                    <div class="item-icon">${it.icon}</div>
                    <div class="shop-item-name" style="font-weight:bold;margin-bottom:4px;">${it.name}</div>
                    <div class="price">${si.currency==='gold'?'<i class="fas fa-coins"></i>':'<i class="fas fa-gem"></i>'} ${si.price}</div>
                `;
                d.style.opacity=canBuy?'1':'0.5';
                d.onclick=()=>this.buyItem(si.id);
                grid.appendChild(d);
            });
            body.appendChild(grid);
        }

        renderSettingsModal(body) {
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">仙机设置</h3>';
            [
                {id:'sound',name:'音效',desc:'开启游戏音效'},
                {id:'autoSave',name:'自动保存',desc:'每30秒自动保存'},
                {id:'animations',name:'动画效果',desc:'开启UI动画'},
            ].forEach(s=>{
                const d=document.createElement('div');
                d.className='panel-list-item';
                d.innerHTML=`
                    <div class="info"><div class="name">${s.name}</div><div class="desc">${s.desc}</div></div>
                    <div class="action">
                        <input type="checkbox" ${gameState.settings[s.id]?'checked':''} onchange="game.toggleSetting('${s.id}')" style="width:18px;height:18px;">
                    </div>
                `;
                body.appendChild(d);
            });
            const saveBtn=document.createElement('button'); saveBtn.className='btn-small'; saveBtn.textContent='💾 手动保存'; saveBtn.onclick=()=>this.saveGame(); body.appendChild(saveBtn);
            const resetBtn=document.createElement('button'); resetBtn.className='btn-small'; resetBtn.textContent='🗑️ 重置游戏';
            resetBtn.style.borderColor='var(--danger)'; resetBtn.style.color='var(--danger)';
            resetBtn.onclick=()=>{ if(confirm('确定重置？此操作不可撤销！')){ localStorage.removeItem(CONFIG.SAVE_KEY); location.reload(); } };
            body.appendChild(resetBtn);
        }

        showAssignModal() {
            const ov=document.getElementById('modal-overlay');
            const body=document.getElementById('modal-body');
            ov.style.display='flex';
            body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">分配属性点</h3>';
            body.innerHTML+=`<p>可分配点数：<strong style="color:var(--vermilion);">${gameState.freePoints}</strong></p>`;
            [
                {id:'hp',name:'生命',desc:'每点+20生命'},
                {id:'atk',name:'攻击',desc:'每点+2攻击'},
                {id:'def',name:'防御',desc:'每点+1防御'},
                {id:'spd',name:'速度',desc:'每点+1速度'},
                {id:'luck',name:'幸运',desc:'每点+1幸运'},
                {id:'comp',name:'悟性',desc:'每点+1悟性'},
            ].forEach(s=>{
                const d=document.createElement('div'); d.className='panel-list-item';
                d.innerHTML=`
                    <div class="info"><div class="name">${s.name}</div><div class="desc">${s.desc}</div></div>
                    <div class="action" style="${gameState.freePoints>0?'color:var(--gold-accent);':'opacity:0.4;'}">升级</div>
                `;
                d.onclick=()=>this.assignStat(s.id);
                body.appendChild(d);
            });
        }

        // --- 事件绑定 ---
        bindEvents() {
            document.getElementById('cultivate-btn').onclick=()=>this.cultivate();
            document.getElementById('auto-cultivate-btn').onclick=()=>{
                gameState.autoCultivate=!gameState.autoCultivate; this.updateUI();
                this.showToast(gameState.autoCultivate?'闭关已开启':'闭关已关闭','success');
            };
            document.getElementById('battle-btn').onclick=()=>{
                if (gameState.currentEnemy) { this.showToast('当前有战斗进行中','warning'); return; }
                this.startBattle();
            };
            document.getElementById('assign-stats-btn').onclick=()=>this.showAssignModal();
            document.querySelectorAll('.nav-talisman').forEach(btn=>{
                btn.onclick=()=>{
                    document.querySelectorAll('.nav-talisman').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    this.showModal(btn.dataset.tab);
                };
            });
            document.getElementById('modal-close').onclick=()=>document.getElementById('modal-overlay').style.display='none';
            document.getElementById('modal-overlay').onclick=e=>{ if(e.target===document.getElementById('modal-overlay')) e.target.style.display='none'; };
        }

        // --- 游戏循环 ---
        startLoops() {
            setInterval(()=>{
                if (gameState.autoCultivate&&gameState.energy>0) this.cultivate();
            }, CONFIG.AUTO_CULTIVATE_INTERVAL);
            setInterval(()=>{
                if (gameState.energy<gameState.maxEnergy) { gameState.energy=Math.min(gameState.maxEnergy,gameState.energy+1); this.updateUI(); }
            }, CONFIG.ENERGY_REGEN_RATE*1000);
            setInterval(()=>{
                if (gameState.settings.autoSave) this.saveGame();
            }, CONFIG.SAVE_INTERVAL);
            setInterval(()=>{ gameState.stats.lastOnlineTime=Date.now(); }, 10000);
        }

        // --- 辅助 ---
        toggleSetting(id) { gameState.settings[id]=!gameState.settings[id]; this.showToast(`${id} ${gameState.settings[id]?'已开启':'已关闭'}`,'success'); }

        showToast(msg, type='success') {
            const c=document.getElementById('toast-container');
            const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
            c.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        showFloatingText(text, color) {
            if (!gameState.settings.animations) return;
            const el=document.createElement('div'); el.className='floating-text'; el.textContent=text; el.style.color=color;
            el.style.left='50%'; el.style.top='50%'; el.style.transform='translate(-50%,-50%)';
            document.querySelector('.avatar-frame').appendChild(el);
            setTimeout(()=>el.remove(),1000);
        }
        showLevelUpAnim() {
            if (!gameState.settings.animations) return;
            const av=document.querySelector('.avatar-frame');
            av.style.transform='scale(1.1)'; av.style.transition='transform 0.3s';
            setTimeout(()=>{ av.style.transform='scale(1)'; },300);
        }
        addBattleLog(msg) {
            const log=document.getElementById('battle-log');
            const m=document.createElement('div'); m.className='battle-msg'; m.textContent=msg;
            log.appendChild(m); log.scrollTop=log.scrollHeight;
            while(log.children.length>12) log.removeChild(log.firstChild);
        }
    }

    // ==================== 启动 ====================
    let game;
    document.addEventListener('DOMContentLoaded', ()=>{
        game = new Game();
        window.game = game;
    });
    </script>
</body>
</html>
