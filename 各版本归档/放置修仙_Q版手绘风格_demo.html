<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙放置 - Q版手绘风格</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4B5 50%, #FFD699 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 手绘风格背景纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,182,193,0.1) 35px, rgba(255,182,193,0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(255,218,185,0.1) 35px, rgba(255,218,185,0.1) 70px);
            pointer-events: none;
            z-index: -1;
        }

        /* ========== 标题区域 ========== */
        .game-title {
            position: relative;
            margin-bottom: 30px;
            text-align: center;
        }

        .title-text {
            font-size: 3.5rem;
            color: #5D4E6D;
            text-shadow: 
                4px 4px 0 #FFF,
                -2px -2px 0 #FFF,
                6px 6px 0 rgba(0,0,0,0.1);
            position: relative;
            display: inline-block;
            transform: rotate(-2deg);
            letter-spacing: 8px;
        }

        .title-text::after {
            content: '放置修仙';
            position: absolute;
            left: 4px;
            top: 4px;
            color: #8B7B8B;
            z-index: -1;
            filter: blur(2px);
        }

        /* 标题装饰 - 飞剑 */
        .title-deco {
            position: absolute;
            font-size: 2.5rem;
            animation: float 3s ease-in-out infinite;
        }

        .title-deco.left {
            left: -60px;
            top: -10px;
            transform: rotate(-30deg);
            animation-delay: 0s;
        }

        .title-deco.right {
            right: -60px;
            top: -10px;
            transform: rotate(30deg);
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
            50% { transform: translateY(-10px) rotate(var(--r, 0deg)); }
        }

        /* ========== 主容器 ========== */
        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ========== 手绘风格卡片 ========== */
        .card {
            background: #FFFEF0;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 4px solid #5D4E6D;
            box-shadow: 
                8px 8px 0 rgba(93, 78, 109, 0.2),
                inset 0 0 30px rgba(255, 228, 181, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 24px;
            border: 2px dashed #D4A5A5;
            pointer-events: none;
        }

        /* ========== 角色区域 ========== */
        .character-card {
            width: 280px;
        }

        .character-avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #E8D5E7 0%, #F0E6F0 100%);
            border-radius: 50%;
            border: 5px solid #5D4E6D;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(93, 78, 109, 0.3),
                inset 0 -10px 20px rgba(0,0,0,0.1);
        }

        .character-avatar::after {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            border: 3px dashed rgba(93, 78, 109, 0.3);
            border-radius: 50%;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .character-name {
            font-size: 1.8rem;
            color: #5D4E6D;
            text-align: center;
            margin-bottom: 10px;
        }

        .realm-badge {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #5D4E6D;
            padding: 8px 20px;
            border-radius: 25px;
            text-align: center;
            font-size: 1.1rem;
            border: 3px solid #5D4E6D;
            box-shadow: 3px 3px 0 rgba(93, 78, 109, 0.3);
            margin-bottom: 15px;
            display: inline-block;
            width: 100%;
        }

        /* ========== 属性条 ========== */
        .stat-item {
            margin-bottom: 12px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.95rem;
            color: #6B5B73;
        }

        .stat-bar-container {
            height: 24px;
            background: #F5E6D3;
            border-radius: 15px;
            border: 3px solid #5D4E6D;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-bar {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            position: relative;
        }

        .stat-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 12px 12px 0 0;
        }

        .stat-bar.exp { background: linear-gradient(90deg, #87CEEB 0%, #4682B4 100%); }
        .stat-bar.hp { background: linear-gradient(90deg, #FF6B6B 0%, #EE5A6F 100%); }
        .stat-bar.mp { background: linear-gradient(90deg, #9B59B6 0%, #8E44AD 100%); }

        /* ========== 中央区域 ========== */
        .center-area {
            flex: 1;
            min-width: 350px;
            max-width: 500px;
        }

        .scene-display {
            background: linear-gradient(180deg, #E6F3FF 0%, #B8D4E8 50%, #9BC4E2 100%);
            border-radius: 20px;
            height: 200px;
            margin-bottom: 20px;
            position: relative;
            border: 4px solid #5D4E6D;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.3);
        }

        /* 云朵装饰 */
        .cloud {
            position: absolute;
            background: #FFF;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: #FFF;
            border-radius: 50%;
        }

        .cloud1 {
            width: 80px;
            height: 40px;
            top: 30px;
            left: 20px;
            animation: drift 15s infinite;
        }

        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }

        .cloud1::after {
            width: 40px;
            height: 40px;
            top: -15px;
            right: 10px;
        }

        @keyframes drift {
            from { transform: translateX(0); }
            to { transform: translateX(30px); }
        }

        /* 修炼人物 */
        .cultivator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            animation: meditate 2s ease-in-out infinite;
        }

        @keyframes meditate {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* 灵气粒子 */
        .spirit-particle {
            position: absolute;
            font-size: 1.2rem;
            animation: rise 3s linear infinite;
            opacity: 0;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) rotate(360deg);
                opacity: 0;
            }
        }

        /* ========== 按钮样式 ========== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-handdrawn {
            background: #FFF;
            border: 4px solid #5D4E6D;
            border-radius: 15px;
            padding: 18px 30px;
            font-size: 1.3rem;
            color: #5D4E6D;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            box-shadow: 
                6px 6px 0 #5D4E6D,
                inset 0 0 20px rgba(255, 228, 181, 0.3);
        }

        .btn-handdrawn:hover {
            transform: translate(2px, 2px);
            box-shadow: 
                4px 4px 0 #5D4E6D,
                inset 0 0 20px rgba(255, 228, 181, 0.5);
        }

        .btn-handdrawn:active {
            transform: translate(4px, 4px);
            box-shadow: 
                2px 2px 0 #5D4E6D,
                inset 0 0 30px rgba(255, 228, 181, 0.7);
        }

        .btn-handdrawn.primary {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            font-size: 1.5rem;
            padding: 22px 35px;
        }

        .btn-handdrawn.secondary {
            background: linear-gradient(135deg, #E8D5E7 0%, #D4C4D4 100%);
        }

        /* 手绘光标 */
        .cursor-hand {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 9999;
            font-size: 2rem;
            transition: transform 0.1s;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        /* ========== 右侧面板 ========== */
        .right-panel {
            width: 280px;
        }

        .panel-title {
            font-size: 1.4rem;
            color: #5D4E6D;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px dashed #D4A5A5;
            padding-bottom: 10px;
        }

        .skill-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skill-item {
            background: #FFF;
            border: 3px solid #5D4E6D;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 rgba(93, 78, 109, 0.2);
        }

        .skill-item:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 rgba(93, 78, 109, 0.2);
        }

        .skill-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFE4B5 0%, #FFD699 100%);
            border-radius: 10px;
            border: 3px solid #5D4E6D;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .skill-info {
            flex: 1;
        }

        .skill-name {
            font-size: 1rem;
            color: #5D4E6D;
            font-weight: bold;
        }

        .skill-level {
            font-size: 0.8rem;
            color: #8B7B8B;
        }

        /* ========== 资源显示 ========== */
        .resources-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .resource-item {
            background: #FFF;
            border: 3px solid #5D4E6D;
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            box-shadow: 4px 4px 0 rgba(93, 78, 109, 0.2);
        }

        .resource-icon {
            font-size: 1.3rem;
        }

        /* ========== 成就徽章 ========== */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .achievement-item {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #F0E68C 0%, #FFD700 100%);
            border: 3px solid #5D4E6D;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 3px 3px 0 rgba(93, 78, 109, 0.2);
            position: relative;
        }

        .achievement-item:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .achievement-item.locked {
            background: #DDD;
            filter: grayscale(1);
        }

        /* ========== 底部导航 ========== */
        .bottom-nav {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: #FFF;
            border: 3px solid #5D4E6D;
            border-radius: 12px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 1rem;
            color: #5D4E6D;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 #5D4E6D;
        }

        .nav-btn:hover {
            background: #FFE4B5;
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #5D4E6D;
        }

        .nav-btn.active {
            background: #FFD700;
        }

        /* ========== 浮动文字 ========== */
        .float-text {
            position: absolute;
            font-size: 1.2rem;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 2px 2px 0 #5D4E6D;
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.3);
            }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) {
            .title-text {
                font-size: 2.5rem;
            }
            
            .main-container {
                flex-direction: column;
                align-items: center;
            }
            
            .character-card,
            .right-panel {
                width: 100%;
                max-width: 400px;
            }
            
            .center-area {
                min-width: auto;
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- 手绘光标 -->
    <div class="cursor-hand" id="cursor">☝️</div>

    <!-- 标题 -->
    <div class="game-title">
        <span class="title-deco left" style="--r: -30deg;">🗡️</span>
        <h1 class="title-text">放置修仙</h1>
        <span class="title-deco right" style="--r: 30deg;">☁️</span>
    </div>

    <!-- 资源栏 -->
    <div class="resources-bar">
        <div class="resource-item">
            <span class="resource-icon">💰</span>
            <span id="gold">1,250</span>
        </div>
        <div class="resource-item">
            <span class="resource-icon">💎</span>
            <span id="gems">88</span>
        </div>
        <div class="resource-item">
            <span class="resource-icon">⚡</span>
            <span id="spirit">2,456</span>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧：角色信息 -->
        <div class="card character-card">
            <div class="character-avatar">🧘</div>
            <div class="character-name">修仙者</div>
            <div class="realm-badge">✨ 筑基期 · 三层 ✨</div>
            
            <div class="stat-item">
                <div class="stat-label">
                    <span>📈 修为</span>
                    <span id="exp-text">75%</span>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-bar exp" style="width: 75%"></div>
                </div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">
                    <span>❤️ 生命</span>
                    <span id="hp-text">450/500</span>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-bar hp" style="width: 90%"></div>
                </div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">
                    <span>🔮 灵力</span>
                    <span id="mp-text">180/200</span>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-bar mp" style="width: 90%"></div>
                </div>
            </div>

            <div style="margin-top: 15px; font-size: 0.9rem; color: #6B5B73;">
                <div>⚔️ 攻击: 85</div>
                <div>🛡️ 防御: 62</div>
                <div>⚡ 速度: 45</div>
            </div>
        </div>

        <!-- 中间：修炼场景 -->
        <div class="center-area">
            <div class="scene-display" id="scene">
                <div class="cloud cloud1"></div>
                <div class="cultivator">🧘‍♂️</div>
            </div>

            <div class="btn-group">
                <button class="btn-handdrawn primary" id="cultivate-btn">
                    🧘‍♂️ 修炼 (+15 修为)
                </button>
                <button class="btn-handdrawn secondary" id="auto-btn">
                    ⏯️ 自动修炼: 关闭
                </button>
                <button class="btn-handdrawn" id="breakthrough-btn">
                    ⚡ 突破境界
                </button>
            </div>
        </div>

        <!-- 右侧：技能与成就 -->
        <div class="right-panel">
            <div class="card" style="margin-bottom: 15px;">
                <div class="panel-title">
                    📜 功法
                </div>
                <div class="skill-list">
                    <div class="skill-item" onclick="upgradeSkill(this)">
                        <div class="skill-icon">🔥</div>
                        <div class="skill-info">
                            <div class="skill-name">火球术</div>
                            <div class="skill-level">Lv.3 ↑</div>
                        </div>
                    </div>
                    <div class="skill-item" onclick="upgradeSkill(this)">
                        <div class="skill-icon">💚</div>
                        <div class="skill-info">
                            <div class="skill-name">治愈术</div>
                            <div class="skill-level">Lv.2 ↑</div>
                        </div>
                    </div>
                    <div class="skill-item" onclick="upgradeSkill(this)">
                        <div class="skill-icon">🧘</div>
                        <div class="skill-info">
                            <div class="skill-name">冥想</div>
                            <div class="skill-level">Lv.5 ↑</div>
                        </div>
                    </div>
                    <div class="skill-item" onclick="upgradeSkill(this)">
                        <div class="skill-icon">⚡</div>
                        <div class="skill-info">
                            <div class="skill-name">雷电诀</div>
                            <div class="skill-level">Lv.1 ↑</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="panel-title">
                    🏆 成就
                </div>
                <div class="achievement-grid">
                    <div class="achievement-item" title="初入仙途">🌟</div>
                    <div class="achievement-item" title="小有成就">💫</div>
                    <div class="achievement-item locked" title="未解锁">🔒</div>
                    <div class="achievement-item locked" title="未解锁">🔒</div>
                    <div class="achievement-item locked" title="未解锁">🔒</div>
                    <div class="achievement-item locked" title="未解锁">🔒</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <button class="nav-btn active">🏠 修炼</button>
        <button class="nav-btn">⚔️ 战斗</button>
        <button class="nav-btn">🎒 背包</button>
        <button class="nav-btn">🏪 商店</button>
        <button class="nav-btn">📊 统计</button>
    </div>

    <script>
        // 手绘光标跟随
        document.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 点击效果
        document.addEventListener('mousedown', () => {
            document.getElementById('cursor').textContent = '✊';
        });

        document.addEventListener('mouseup', () => {
            document.getElementById('cursor').textContent = '☝️';
        });

        // 游戏状态
        let gameState = {
            exp: 75,
            maxExp: 100,
            hp: 450,
            maxHp: 500,
            mp: 180,
            maxMp: 200,
            gold: 1250,
            gems: 88,
            spirit: 2456,
            autoCultivate: false,
            level: 3
        };

        // 修炼按钮
        document.getElementById('cultivate-btn').addEventListener('click', function(e) {
            cultivate(e);
        });

        function cultivate(e) {
            // 增加修为
            gameState.exp = Math.min(gameState.exp + 15, gameState.maxExp);
            updateUI();

            // 显示浮动文字
            const btn = document.getElementById('cultivate-btn');
            const rect = btn.getBoundingClientRect();
            showFloatText(rect.left + rect.width/2, rect.top, '+15 修为', '#FFD700');

            // 添加灵气粒子
            createSpiritParticle();

            // 按钮按压效果
            btn.style.transform = 'translate(4px, 4px)';
            btn.style.boxShadow = '2px 2px 0 #5D4E6D';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            }, 150);
        }

        // 自动修炼
        document.getElementById('auto-btn').addEventListener('click', function() {
            gameState.autoCultivate = !gameState.autoCultivate;
            this.textContent = gameState.autoCultivate ? '⏸️ 自动修炼: 开启' : '⏯️ 自动修炼: 关闭';
            this.style.background = gameState.autoCultivate 
                ? 'linear-gradient(135deg, #90EE90 0%, #7CFC00 100%)' 
                : 'linear-gradient(135deg, #E8D5E7 0%, #D4C4D4 100%)';
        });

        // 自动修炼循环
        setInterval(() => {
            if (gameState.autoCultivate && gameState.exp < gameState.maxExp) {
                gameState.exp = Math.min(gameState.exp + 3, gameState.maxExp);
                updateUI();
                if (Math.random() > 0.7) {
                    createSpiritParticle();
                }
            }
        }, 1000);

        // 突破境界
        document.getElementById('breakthrough-btn').addEventListener('click', function() {
            if (gameState.exp >= gameState.maxExp) {
                gameState.exp = 0;
                gameState.level++;
                gameState.maxExp = Math.floor(gameState.maxExp * 1.2);
                updateUI();
                
                // 突破特效
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => createSpiritParticle(), i * 100);
                }
                
                showFloatText(window.innerWidth/2, window.innerHeight/2, '✨ 突破成功! ✨', '#FFD700');
            } else {
                showFloatText(window.innerWidth/2, window.innerHeight/2, '修为不足!', '#FF6B6B');
            }
        });

        // 技能升级
        function upgradeSkill(element) {
            const levelEl = element.querySelector('.skill-level');
            const currentLevel = parseInt(levelEl.textContent.match(/\d+/)[0]);
            levelEl.textContent = `Lv.${currentLevel + 1} ↑`;
            
            // 升级动画
            element.style.transform = 'scale(1.1)';
            setTimeout(() => {
                element.style.transform = '';
            }, 200);
            
            const rect = element.getBoundingClientRect();
            showFloatText(rect.left + rect.width/2, rect.top, '升级!', '#90EE90');
        }

        // 创建灵气粒子
        function createSpiritParticle() {
            const scene = document.getElementById('scene');
            const particle = document.createElement('div');
            particle.className = 'spirit-particle';
            particle.textContent = ['✨', '💫', '🌟', '💨'][Math.floor(Math.random() * 4)];
            particle.style.left = (30 + Math.random() * 40) + '%';
            particle.style.bottom = '20px';
            particle.style.animationDelay = (Math.random() * 0.5) + 's';
            scene.appendChild(particle);
            
            setTimeout(() => particle.remove(), 3000);
        }

        // 显示浮动文字
        function showFloatText(x, y, text, color) {
            const floatEl = document.createElement('div');
            floatEl.className = 'float-text';
            floatEl.textContent = text;
            floatEl.style.color = color;
            floatEl.style.left = x + 'px';
            floatEl.style.top = y + 'px';
            document.body.appendChild(floatEl);
            
            setTimeout(() => floatEl.remove(), 1500);
        }

        // 更新UI
        function updateUI() {
            const expPercent = (gameState.exp / gameState.maxExp * 100).toFixed(0);
            document.getElementById('exp-text').textContent = `${expPercent}%`;
            document.querySelector('.stat-bar.exp').style.width = expPercent + '%';
            
            document.getElementById('hp-text').textContent = `${gameState.hp}/${gameState.maxHp}`;
            document.querySelector('.stat-bar.hp').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
            
            document.getElementById('mp-text').textContent = `${gameState.mp}/${gameState.maxMp}`;
            document.querySelector('.stat-bar.mp').style.width = (gameState.mp / gameState.maxMp * 100) + '%';
            
            document.getElementById('gold').textContent = gameState.gold.toLocaleString();
            document.getElementById('gems').textContent = gameState.gems;
            document.getElementById('spirit').textContent = gameState.spirit.toLocaleString();
            
            // 更新境界显示
            const realms = ['凡人', '练气期', '筑基期', '金丹期', '元婴期', '化神期'];
            const realmIndex = Math.floor(gameState.level / 3);
            const subLevel = (gameState.level % 3) + 1;
            document.querySelector('.realm-badge').textContent = `✨ ${realms[Math.min(realmIndex, realms.length-1)]} · ${subLevel}层 ✨`;
        }

        // 导航按钮切换
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 初始化
        updateUI();

        // 持续产生灵气粒子
        setInterval(() => {
            if (Math.random() > 0.6) {
                createSpiritParticle();
            }
        }, 2000);
    </script>
</body>
</html>
