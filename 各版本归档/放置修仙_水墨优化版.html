<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放置修仙 - 水墨仙侠版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
/* ==================== 水墨仙侠全局变量 ==================== */
:root {
    /* 国风色彩系统 */
    --墨黑: #1a1a2e;
    --靛青: #16213e;
    --石青: #3a506b;
    --月白: #f0f5f9;
    --银朱: #b73e3e;
    --赭石: #8b7355;
    --金箔: #d4af37;
    --胭脂: #c54c82;
    --春绿: #7bc043;
    --空青: #64ffda;
    
    /* 功能色 */
    --bg-primary: var(--墨黑);
    --bg-secondary: var(--靛青);
    --bg-tertiary: var(--石青);
    --text-primary: var(--月白);
    --text-secondary: #a8b2d1;
    --accent: var(--空青);
    --accent-dark: #4cd4b0;
    --danger: var(--银朱);
    --warning: var(--金箔);
    --success: var(--春绿);
    --purple: var(--胭脂);
    --blue: #3498db;
}

/* ==================== 水墨背景纹理 ==================== */
body {
    font-family: 'SimHei', 'STHeiti', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    background: 
        radial-gradient(circle at 20% 80%, rgba(26, 83, 92, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(58, 80, 107, 0.3) 0%, transparent 50%),
        linear-gradient(135deg, var(--墨黑) 0%, var(--靛青) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* 宣纸纹理效果 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB2aWV3Qm94PSIwIDAgMjAwIDIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZGVmcz48cmFkaWFsR3JhZGllbnQgaWQ9ImciIGN4PSIwLjUiIGN5PSIwLjUiIHI9IjAuNSI+PHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIvPjxzdG9wIG9mZnNldD0iMTAwJSIgc3RvcC1jb2xvcj0icmdiYSgyNTUsMjU1LDI1NSwwKSIvPjwvcmFkaWFsR3JhZGllbnQ+PC9kZWZzPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InVybCgjZykiIGZpbGwtb3BhY2l0eT0iMC4xIi8+PC9zdmc+');
    opacity: 0.2;
    pointer-events: none;
    z-index: -1;
}

#game-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 15px;
    position: relative;
    z-index: 1;
}

/* ==================== 顶部状态栏 - 仙气光带 ==================== */
#status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(22, 33, 62, 0.9);
    border-radius: 16px;
    margin-bottom: 20px;
    border: 2px solid rgba(100, 255, 218, 0.15);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
    flex-wrap: wrap;
    gap: 15px;
}

/* 仙气光带装饰 */
#status-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: lightFlow 8s linear infinite;
}

@keyframes lightFlow {
    0% { left: -100%; }
    100% { left: 100%; }
}

.status-left {
    display: flex;
    align-items: center;
    gap: 20px;
}

.game-title {
    font-size: 1.8em;
    font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 15px rgba(100, 255, 218, 0.7);
    position: relative;
    padding-left: 40px;
}

.game-title::before {
    content: '⚡';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.5em;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
    50% { opacity: 0.7; transform: translateY(-50%) scale(1.1); }
}

.status-center {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    flex: 1;
}

.resource-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1em;
    font-weight: bold;
    padding: 8px 16px;
    background: rgba(58, 80, 107, 0.5);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s;
    min-width: 120px;
    justify-content: center;
}

.resource-item:hover {
    background: rgba(58, 80, 107, 0.8);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(100, 255, 218, 0.2);
}

.resource-icon {
    font-size: 1.3em;
    color: var(--accent);
}

.status-right {
    color: var(--success);
    font-size: 0.9em;
    padding: 8px 16px;
    background: rgba(58, 80, 107, 0.3);
    border-radius: 10px;
    border: 1px solid rgba(123, 192, 67, 0.3);
}

/* ==================== 主区域布局 ==================== */
#main-area {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 20px;
    margin-bottom: 20px;
}

@media (max-width: 1200px) {
    #main-area {
        grid-template-columns: 1fr;
    }
}

/* ==================== 角色区域 - 玉璧仙缘 ==================== */
#character-section {
    background: rgba(22, 33, 62, 0.9);
    border-radius: 20px;
    padding: 25px;
    border: 2px solid rgba(100, 255, 218, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: hidden;
}

#character-section::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    pointer-events: none;
}

#character-display {
    display: flex;
    align-items: center;
    gap: 35px;
    margin-bottom: 25px;
    padding: 25px;
    background: rgba(58, 80, 107, 0.4);
    border-radius: 18px;
    flex-wrap: wrap;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

#character-avatar {
    position: relative;
    width: 140px;
    height: 140px;
}

.avatar-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--胭脂), var(--空青));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4.5em;
    box-shadow: 
        0 0 40px rgba(197, 76, 130, 0.6),
        inset 0 0 20px rgba(255, 255, 255, 0.1);
    animation: pulse 3s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

.avatar-circle::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

#cultivation-aura {
    position: absolute;
    top: -15px;
    left: -15px;
    right: -15px;
    bottom: -15px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    animation: rotateAura 8s linear infinite;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
}

#cultivation-aura.active {
    opacity: 0.6;
}

@keyframes rotateAura {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

#character-info {
    flex: 1;
    min-width: 250px;
}

#character-info h2 {
    font-size: 2em;
    margin-bottom: 15px;
    color: var(--accent);
    text-shadow: 0 2px 8px rgba(100, 255, 218, 0.5);
    position: relative;
    display: inline-block;
}

#character-info h2::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
}

.level-display {
    font-size: 1.2em;
    margin-bottom: 15px;
    color: var(--text-secondary);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

.exp-bar-container {
    width: 100%;
    height: 30px;
    background: rgba(26, 26, 46, 0.8);
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
}

.exp-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--空青), var(--胭脂));
    border-radius: 15px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9em;
    font-weight: bold;
    color: var(--墨黑);
    width: 0%;
    position: relative;
    overflow: hidden;
}

.exp-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(255, 255, 255, 0.2) 50%, 
        transparent 100%);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* ==================== 修炼面板 - 丹药符咒 ==================== */
#cultivation-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}

@media (max-width: 768px) {
    #cultivation-panel {
        grid-template-columns: 1fr;
    }
}

.btn {
    padding: 18px 25px;
    border: none;
    border-radius: 12px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    min-height: 100px;
    justify-content: center;
}

.btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.2), 
        transparent);
    transition: left 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
}

.btn:active {
    transform: translateY(-1px);
}

.btn-cultivate {
    background: linear-gradient(135deg, var(--胭脂), var(--空青));
    color: var(--月白);
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.btn-cultivate:hover {
    box-shadow: 0 10px 25px rgba(197, 76, 130, 0.5);
}

.btn-auto {
    background: rgba(58, 80, 107, 0.8);
    color: var(--text-primary);
    border: 2px solid var(--accent);
}

.btn-auto.active {
    background: linear-gradient(135deg, var(--accent), var(--blue));
    border-color: transparent;
}

.btn-icon {
    font-size: 2em;
}

.btn-hint, .auto-status {
    font-size: 0.85em;
    opacity: 0.9;
    color: rgba(255, 255, 255, 0.8);
}

/* ==================== 战斗区域 - 妖兽图鉴 ==================== */
#battle-section {
    background: rgba(58, 80, 107, 0.6);
    padding: 25px;
    border-radius: 18px;
    border: 2px solid rgba(255, 107, 107, 0.2);
    position: relative;
    overflow: hidden;
}

#battle-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGgxMDB2MTAwSDB6IiBmaWxsPSJub25lIi8+PHBhdGggZD0iTTEwIDIwbDIwLTIwbDIwIDIwIDIwLTIwIDIwIDIwLTIwIDIwIDIwIDIwLTIwIDIwLTIwLTIwLTIwIDIwLTIwLTIwIDIwLTIwek00MCA4MGwyMC0yMCAyMCAyMHoiIiBmaWxsPSJyZ2JhKDE4Myw2Niw2NiwwLjEpIiBzdHJva2U9InJnYmEoMTgzLDY2LDY2LDAuMykiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPgo=');
    opacity: 0.1;
    pointer-events: none;
}

#battle-section h3 {
    margin-bottom: 20px;
    color: var(--danger);
    font-size: 1.5em;
    text-shadow: 0 2px 4px rgba(183, 62, 62, 0.5);
    display: flex;
    align-items: center;
    gap: 10px;
}

#enemy-display {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding: 20px;
    background: rgba(26, 26, 46, 0.8);
    border-radius: 12px;
    border: 1px solid rgba(255, 107, 107, 0.3);
    flex-wrap: wrap;
}

.enemy-avatar {
    font-size: 4em;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
}

.enemy-info {
    flex: 1;
    min-width: 200px;
}

.enemy-hp-bar {
    width: 100%;
    height: 24px;
    background: rgba(22, 33, 62, 0.8);
    border-radius: 12px;
    overflow: hidden;
    margin: 10px 0;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
}

.hp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--accent));
    border-radius: 12px;
    transition: width 0.3s ease;
    width: 100%;
    position: relative;
    overflow: hidden;
}

.hp-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(255, 255, 255, 0.2) 50%, 
        transparent 100%);
    animation: shimmer 3s infinite;
}

#battle-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--danger), #e74c3c);
    color: var(--月白);
    border: none;
    border-radius: 12px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
}

#battle-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
}

#battle-btn:hover::before {
    opacity: 1;
}

#battle-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
}

#battle-log {
    margin-top: 15px;
    padding: 15px;
    background: rgba(26, 26, 46, 0.9);
    border-radius: 10px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 0.9em;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.battle-message {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ==================== 右侧面板 - 卷轴样式 ==================== */
#side-panels {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.panel {
    background: rgba(22, 33, 62, 0.9);
    border-radius: 18px;
    padding: 20px;
    border: 2px solid rgba(100, 255, 218, 0.1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    position: relative;
    overflow: hidden;
}

.panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        linear-gradient(90deg, transparent 95%, rgba(255,255,255,0.05) 100%),
        linear-gradient(0deg, transparent 95%, rgba(255,255,255,0.05) 100%);
    pointer-events: none;
}

.panel h3 {
    margin-bottom: 20px;
    color: var(--accent);
    font-size: 1.4em;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
}

.panel h3::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

@media (max-width: 1400px) {
    .stats-grid {
        grid-template-columns: 1fr;
    }
}

.stat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: rgba(58, 80, 107, 0.5);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s;
}

.stat-item:hover {
    background: rgba(58, 80, 107, 0.8);
    border-color: rgba(100, 255, 218, 0.3);
    transform: translateX(5px);
}

.stat-label {
    color: var(--text-secondary);
    font-size: 0.95em;
    display: flex;
    align-items: center;
    gap: 8px;
}

.stat-value {
    font-weight: bold;
    color: var(--accent);
    font-size: 1.1em;
}

.btn-small {
    width: 100%;
    padding: 10px;
    background: rgba(58, 80, 107, 0.8);
    color: var(--text-primary);
    border: 1px solid var(--accent);
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.3s;
    font-weight: 500;
}

.btn-small:hover {
    background: var(--accent);
    color: var(--墨黑);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(100, 255, 218, 0.3);
}

.free-points {
    margin-top: 15px;
    padding: 12px;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
    border-radius: 10px;
    text-align: center;
    color: var(--warning);
    font-weight: bold;
    border: 1px solid rgba(212, 175, 55, 0.3);
    animation: pulseGold 2s ease-in-out infinite;
}

@keyframes pulseGold {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
}

/* ==================== 列表样式 ==================== */
.skills-list, .inventory-list, .achievements-list {
    max-height: 220px;
    overflow-y: auto;
    padding-right: 5px;
}

.skill-item, .item-item, .achievement-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: rgba(58, 80, 107, 0.5);
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid transparent;
}

.skill-item:hover, .item-item:hover {
    background: rgba(58, 80, 107, 0.8);
    border-color: rgba(100, 255, 218, 0.3);
    transform: translateX(5px);
}

.achievement-item {
    opacity: 0.6;
    cursor: default;
}

.achievement-item.unlocked {
    opacity: 1;
    border: 1px solid var(--金箔);
    background: rgba(212, 175, 55, 0.1);
}

.skill-icon, .item-icon, .achievement-icon {
    font-size: 1.8em;
    flex-shrink: 0;
}

.skill-info, .achievement-info {
    flex: 1;
    min-width: 0;
}

.skill-name, .item-name, .achievement-name {
    font-weight: bold;
    font-size: 1em;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.skill-desc, .achievement-desc {
    font-size: 0.85em;
    color: var(--text-secondary);
    line-height: 1.3;
}

.item-quantity {
    color: var(--accent);
    font-weight: bold;
    font-size: 1.1em;
}

.skill-level {
    color: var(--warning);
    font-weight: bold;
    font-size: 1.1em;
    flex-shrink: 0;
}

/* ==================== 底部导航 - 符咒玉佩 ==================== */
#bottom-nav {
    display: flex;
    gap: 12px;
    padding: 20px;
    background: rgba(22, 33, 62, 0.9);
    border-radius: 18px;
    border: 2px solid rgba(100, 255, 218, 0.1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    flex-wrap: wrap;
    justify-content: center;
}

.nav-btn {
    flex: 1;
    min-width: 90px;
    padding: 14px 10px;
    background: rgba(58, 80, 107, 0.7);

    cursor: pointer;
    font-size: 0.95em;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
}

.nav-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    transform: translateY(-100%);
    transition: transform 0.3s;
}

.nav-btn:hover::before {
    transform: translateY(0);
}

.nav-btn:hover {
    background: rgba(100, 255, 218, 0.1);
    color: var(--accent);
    transform: translateY(-2px);
    border-color: rgba(100, 255, 218, 0.3);
}

.nav-btn.active {

    color: var(--墨黑);
    border-color: transparent;
    font-weight: bold;

    transform: translateY(0);

/* ==================== 模态框样式 ==================== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
}

.modal-content {
    background: linear-gradient(135deg, var(--靛青), var(--墨黑));
    padding: 30px;
    border-radius: 20px;
    max-width: 700px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    border: 2px solid var(--accent);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.4s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
}

.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 2.5em;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.3s;
}

.modal-close:hover {
    color: var(--danger);
    transform: rotate(90deg);
    background: rgba(255, 255, 255, 0.1);
}

/* ==================== 提示信息 ==================== */
#toast-container {
    position: fixed;
    top: 25px;
    right: 25px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    padding: 16px 24px;
    background: rgba(22, 33, 62, 0.95);
    border: 1px solid var(--accent);
    border-radius: 12px;
    animation: slideInRight 0.3s ease;
    max-width: 350px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
}

.toast::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent);
}

.toast.success {
    border-color: var(--success);
}

.toast.success::before {
    background: var(--success);
}

.toast.warning {
    border-color: var(--warning);
}

.toast.warning::before {
    background: var(--warning);
}

.toast.error {
    border-color: var(--danger);
}

.toast.error::before {
    background: var(--danger);
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
}

/* ==================== 商店样式 ==================== */
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.shop-item {
    background: rgba(58, 80, 107, 0.6);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.shop-item:hover {
    border-color: var(--accent);
    transform: translateY(-5px) scale(1.03);
    background: rgba(58, 80, 107, 0.9);
    box-shadow: 0 10px 25px rgba(100, 255, 218, 0.2);
}

.shop-item-icon {
    font-size: 3.5em;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

.shop-item-name {
    font-weight: bold;
    font-size: 1.1em;
    margin-bottom: 5px;
}

.shop-item-price {
    color: var(--金箔);
    font-weight: bold;
    font-size: 1.1em;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
}

/* ==================== 设置面板 ==================== */
.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    background: rgba(58, 80, 107, 0.6);
    border-radius: 12px;
    margin-bottom: 15px;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.setting-item:hover {
    background: rgba(58, 80, 107, 0.9);
    border-color: rgba(100, 255, 218, 0.3);
    transform: translateX(5px);
}

.setting-label {
    font-weight: bold;
    font-size: 1.05em;
    margin-bottom: 5px;
    display: block;
}

/* 开关样式 */
.switch {
    position: relative;
    display: inline-block;
    width: 55px;
    height: 28px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--石青);
    transition: 0.4s;
    border-radius: 28px;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 4px;
    bottom: 4px;
    background-color: var(--月白);
    transition: 0.4s;
    border-radius: 50%;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

input:checked + .slider {
    background-color: var(--accent);
    border-color: var(--accent);
}

input:checked + .slider:before {
    transform: translateX(27px);
}

/* ==================== 响应式设计 ==================== */
@media (max-width: 768px) {
    #status-bar {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }
    
    .status-left, .status-center, .status-right {
        width: 100%;
        justify-content: center;
    }
    
    .resource-item {
        min-width: 100%;
        justify-content: space-between;
    }
    
    #character-display {
        flex-direction: column;
        text-align: center;
    }
    
    #character-info h2::after {
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;

    #bottom-nav {
        flex-wrap: wrap;
    }
    
    .nav-btn {
        flex: 0 0 calc(33.333% - 8px);
        font-size: 0.9em;
        padding: 12px 8px;
    }
    
    .shop-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .modal-content {
        padding: 20px;
        width: 95%;
    }
}

@media (max-width: 480px) {
    .nav-btn {
        flex: 0 0 calc(50% - 6px);
    }
    
    .shop-grid {
        grid-template-columns: 1fr;
    }
    
    #cultivation-panel {

    }

    }
}

// ==================== 游戏状态 ====================
let gameState = {
    level: 1,
    exp: 0,
    expToNext: 100,
    realm: '凡人',
    gold: 0,
    gem: 0,
    energy: 100,
    maxEnergy: 100,
    hp: 100,
    maxHp: 100,
    atk: 10,
    def: 5,
    spd: 10,
    luck: 1,
    comprehension: 1,
    freePoints: 0,
    skills: {},
    equipment: {
        weapon: null,
        armor: null,
    },
    inventory: {},
    achievements: [],
    currentEnemy: null,
    enemyHp: 0,
    autoCultivate: false,
    stats: {
        totalCultivations: 0,
        totalBattles: 0,
        totalWins: 0,
        totalGold: 0,
        totalExp: 0,
        totalDeaths: 0,
        startTime: Date.now(),
        lastSaveTime: Date.now(),
        lastOnlineTime: Date.now(),
    },
    settings: {
        sound: true,
        autoSave: true,
        animations: true,
    },
};

// ==================== 游戏核心类 ====================
class Game {
    constructor() {
        this.init();
    }
    
    init() {
        this.loadGame();
        this.setupUI();
        this.setupEventListeners();
        this.startGameLoop();
        this.checkOfflineEarnings();
        this.updateUI();
    }
    
    loadGame() {
        const saved = localStorage.getItem(CONFIG.SAVE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                gameState = this.mergeDeep(gameState, parsed);
            } catch (e) {
                console.error('加载存档失败:', e);
            }
        }
    }
    
    saveGame() {
        try {
            gameState.stats.lastSaveTime = Date.now();
            localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(gameState));
            this.showToast('游戏已保存', 'success');
            document.getElementById('save-status').textContent = '已保存 ' + new Date().toLocaleTimeString();
        } catch (e) {
            console.error('保存失败:', e);
            this.showToast('保存失败', 'error');
        }
    }
    
    mergeDeep(target, source) {
        const output = { ...target };
        if (this.isObject(target) && this.isObject(source)) {
            Object.keys(source).forEach(key => {
                if (this.isObject(source[key]) && key in target) {
                    output[key] = this.mergeDeep(target[key], source[key]);
                } else {
                    output[key] = source[key];
                }
            });
        }
        return output;
    }
    
    isObject(item) {
        return item && typeof item === 'object' && !Array.isArray(item);
    }
    
    checkOfflineEarnings() {
        const lastTime = gameState.stats.lastOnlineTime;
        const now = Date.now();
        const offlineSeconds = (now - lastTime) / 1000;
        
        if (offlineSeconds > 60 && gameState.autoCultivate) {
            const maxSeconds = CONFIG.OFFLINE_MAX_HOURS * 3600;
            const effectiveSeconds = Math.min(offlineSeconds, maxSeconds);
            const offlineMinutes = Math.floor(effectiveSeconds / 60);
            
            const baseExpPerMinute = 10 * this.getCultivationMultiplier();
            const offlineExp = Math.floor(baseExpPerMinute * offlineMinutes * 0.5);
            const offlineGold = Math.floor(offlineExp * 0.3);
            
            if (offlineExp > 0) {
                this.gainExp(offlineExp);
                this.gainGold(offlineGold);
                
                const popup = document.getElementById('offline-earnings');
                popup.textContent = `离线收益: ${this.formatTime(offlineSeconds)} 获得 ${offlineExp} 经验, ${offlineGold} 金币`;
                popup.style.display = 'block';
                setTimeout(() => {
                    popup.style.display = 'none';
                }, 5000);
            }
        }
        
        gameState.stats.lastOnlineTime = now;
    }
    
    getCultivationMultiplier() {
        let multiplier = 1;
        
        const meditationLevel = gameState.skills['meditation'] || 0;
        if (meditationLevel > 0) {
            const skill = SKILLS.find(s => s.id === 'meditation');
            multiplier *= skill.effect(meditationLevel);
        }
        
        const doubleExpLevel = gameState.skills['double_exp'] || 0;
        if (doubleExpLevel > 0) {
            const skill = SKILLS.find(s => s.id === 'double_exp');
            multiplier *= skill.effect(doubleExpLevel);
        }
        
        return multiplier;
    }
    
    cultivate() {
        if (gameState.energy <= 0) {
            this.showToast('能量不足!', 'warning');
            return;
        }
        
        gameState.energy = Math.max(0, gameState.energy - 1);
        gameState.stats.totalCultivations++;
        
        const baseExp = 10;
        const expGain = Math.floor(baseExp * this.getCultivationMultiplier());
        this.gainExp(expGain);
        
        if (Math.random() < 0.3) {
            const goldGain = Math.floor(Math.random() * 5) + 1;
            this.gainGold(goldGain);
        }
        
        this.showFloatingText(`+${expGain} EXP`, '#64ffda');
        this.updateUI();
    }
    
    gainExp(amount) {
        gameState.exp += amount;
        gameState.stats.totalExp += amount;
        
        while (gameState.exp >= gameState.expToNext) {
            gameState.exp -= gameState.expToNext;
            this.levelUp();
        }
        
        this.updateUI();
    }
    
    levelUp() {
        gameState.level++;
        gameState.freePoints += 2;
        gameState.expToNext = Math.floor(gameState.expToNext * 1.5);
        
        this.updateRealm();
        
        gameState.maxHp += 10;
        gameState.hp = gameState.maxHp;
        gameState.atk += 2;
        gameState.def += 1;
        gameState.spd += 1;
        
        if (gameState.level % 5 === 0) {
            gameState.maxEnergy += 20;
            gameState.energy = gameState.maxEnergy;
        }
        
        this.showLevelUpAnimation();
        this.showToast(`升级! 等级 ${gameState.level}`, 'success');
        this.checkAchievements();
    }
    
    updateRealm() {
        let newRealm = REALMS[0].name;
        for (let i = REALMS.length - 1; i >= 0; i--) {
            if (gameState.level >= REALMS[i].level) {
                newRealm = REALMS[i].name;
                break;
            }
        }
        
        if (newRealm !== gameState.realm) {
            gameState.realm = newRealm;
            this.showToast(`突破至 ${newRealm}!`, 'success');
        }
    }
    
    gainGold(amount) {
        gameState.gold += amount;
        gameState.stats.totalGold += amount;
        this.updateUI();
    }
    
    startBattle() {
        const enemyIndex = Math.min(Math.floor(gameState.level / 10), ENEMIES.length - 1);
        const enemyTemplate = ENEMIES[Math.min(enemyIndex, ENEMIES.length - 1)];
        gameState.currentEnemy = { ...enemyTemplate };
        gameState.enemyHp = enemyTemplate.hp;
        
        this.updateEnemyDisplay();
        this.showToast(`遭遇 ${enemyTemplate.name}!`, 'warning');
        
        this.autoBattle();
    }
    
    autoBattle() {
        if (!gameState.currentEnemy || gameState.currentEnemy.hp <= 0) return;
        
        const battleInterval = setInterval(() => {
            if (!gameState.currentEnemy) {
                clearInterval(battleInterval);
                return;
            }
            
            const playerDmg = Math.max(1, gameState.atk - gameState.currentEnemy.def + Math.floor(Math.random() * 5));
            gameState.currentEnemy.hp -= playerDmg;
            
            this.addBattleLog(`你对 ${gameState.currentEnemy.name} 造成 ${playerDmg} 点伤害`);
            
            if (gameState.currentEnemy.hp <= 0) {
                this.winBattle();
                clearInterval(battleInterval);
                return;
            }
            
            const enemyDmg = Math.max(1, gameState.currentEnemy.atk - gameState.def + Math.floor(Math.random() * 3));
            gameState.hp -= enemyDmg;
            
            this.addBattleLog(`${gameState.currentEnemy.name} 对你造成 ${enemyDmg} 点伤害`);
            
            if (gameState.hp <= 0) {
                this.loseBattle();
                clearInterval(battleInterval);
                return;
            }
            
            this.updateEnemyDisplay();
            this.updateUI();
        }, CONFIG.BATTLE_TICK);
    }
    
    winBattle() {
        gameState.stats.totalBattles++;
        gameState.stats.totalWins++;
        
        const expGain = gameState.currentEnemy.exp;
        const goldGain = gameState.currentEnemy.gold;
        
        this.gainExp(expGain);
        this.gainGold(goldGain);
        
        this.addBattleLog(`胜利! 获得 ${expGain} 经验, ${goldGain} 金币`);
        this.showToast(`战斗胜利!`, 'success');
        
        gameState.currentEnemy = null;
        this.updateEnemyDisplay();
        this.checkAchievements();
    }
    
    loseBattle() {
        gameState.stats.totalBattles++;
        gameState.stats.totalDeaths++;
        
        gameState.hp = Math.floor(gameState.maxHp * 0.1);
        
        this.addBattleLog('战斗失败...');
        this.showToast('战斗失败, 生命值恢复10%', 'error');
        
        gameState.currentEnemy = null;
        this.updateEnemyDisplay();
    }
    
    updateUI() {
        document.getElementById('gold').textContent = this.formatNumber(gameState.gold);
        document.getElementById('gem').textContent = this.formatNumber(gameState.gem);
        document.getElementById('energy').textContent = `${gameState.energy}/${gameState.maxEnergy}`;
        
        document.getElementById('level').textContent = gameState.level;
        document.getElementById('realm').textContent = gameState.realm;
        
        const expPercent = (gameState.exp / gameState.expToNext) * 100;
        document.getElementById('exp-bar').style.width = `${expPercent}%`;
        document.getElementById('exp-text').textContent = `${this.formatNumber(gameState.exp)}/${this.formatNumber(gameState.expToNext)}`;
        
        document.getElementById('stat-hp').textContent = gameState.maxHp;
        document.getElementById('stat-atk').textContent = gameState.atk;
        document.getElementById('stat-def').textContent = gameState.def;
        document.getElementById('stat-spd').textContent = gameState.spd;
        document.getElementById('stat-luck').textContent = gameState.luck;
        document.getElementById('stat-comp').textContent = gameState.comprehension;
        
        if (gameState.freePoints > 0) {
            document.getElementById('free-points').style.display = 'block';
            document.getElementById('free-points-num').textContent = gameState.freePoints;
        } else {
            document.getElementById('free-points').style.display = 'none';
        }
        
        const autoBtn = document.getElementById('auto-cultivate-btn');
        if (gameState.autoCultivate) {
            autoBtn.classList.add('active');
            document.getElementById('auto-status').textContent = '已开启';
            document.getElementById('cultivation-aura').classList.add('active');
        } else {
            autoBtn.classList.remove('active');
            document.getElementById('auto-status').textContent = '未开启';
            document.getElementById('cultivation-aura').classList.remove('active');
        }
        
        this.updateSkillsList();
        this.updateInventoryList();
        this.updateAchievementsList();
    }
    
    updateEnemyDisplay() {
        if (!gameState.currentEnemy) {
            const enemyIndex = Math.min(Math.floor(gameState.level / 10), ENEMIES.length - 1);
            const enemy = ENEMIES[Math.min(enemyIndex, ENEMIES.length - 1)];
            document.getElementById('enemy-emoji').textContent = enemy.emoji;
            document.getElementById('enemy-name').textContent = enemy.name;
            document.getElementById('enemy-hp').style.width = '100%';
            document.getElementById('enemy-hp-text').textContent = `${enemy.hp}/${enemy.hp}`;
        } else {
            const hpPercent = (gameState.currentEnemy.hp / gameState.currentEnemy.maxHp) * 100;
            document.getElementById('enemy-emoji').textContent = gameState.currentEnemy.emoji;
            document.getElementById('enemy-name').textContent = gameState.currentEnemy.name;
            document.getElementById('enemy-hp').style.width = `${hpPercent}%`;
            document.getElementById('enemy-hp-text').textContent = `${Math.max(0, gameState.currentEnemy.hp)}/${gameState.currentEnemy.maxHp}`;
        }
    }
    
    updateSkillsList() {
        const container = document.getElementById('skills-list');
        container.innerHTML = '';
        
        SKILLS.forEach(skill => {
            const level = gameState.skills[skill.id] || 0;
            const item = document.createElement('div');
            item.className = 'skill-item';
            item.onclick = () => this.upgradeSkill(skill.id);
            
            item.innerHTML = `
                <div class="skill-icon">${skill.icon}</div>
                <div class="skill-info">
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-desc">${skill.desc}</div>
                </div>
                <div class="skill-level">Lv.${level}/${skill.maxLevel}</div>
            `;
            
            container.appendChild(item);
        });
    }
    
    updateInventoryList() {
        const container = document.getElementById('inventory-list');
        container.innerHTML = '';
        
        const items = Object.entries(gameState.inventory);
        if (items.length === 0) {
            container.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:20px;">背包为空</div>';
            return;
        }
        
        items.forEach(([itemId, quantity]) => {
            const item = ITEMS.find(i => i.id === itemId);
            if (!item) return;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item-item';
            itemDiv.onclick = () => this.useItem(itemId);
            
            itemDiv.innerHTML = `
                <div class="item-icon">${item.icon}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-quantity">x${quantity}</div>
            `;
            
            container.appendChild(itemDiv);
        });
    }
    
    updateAchievementsList() {
        const container = document.getElementById('achievements-list');
        container.innerHTML = '';
        
        ACHIEVEMENTS.forEach(achievement => {
            const unlocked = gameState.achievements.includes(achievement.id);
            const item = document.createElement('div');
            item.className = `achievement-item ${unlocked ? 'unlocked' : ''}`;
            
            item.innerHTML = `
                <div class="achievement-icon">${achievement.icon}</div>
                <div class="achievement-info">
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                </div>
            `;
            
            container.appendChild(item);
        });
    }
    
    upgradeSkill(skillId) {
        const skill = SKILLS.find(s => s.id === skillId);
        const currentLevel = gameState.skills[skillId] || 0;
        
        if (currentLevel >= skill.maxLevel) {
            this.showToast('技能已满级', 'warning');
            return;
        }
        
        const cost = skill.cost(currentLevel + 1);
        if (gameState.gold < cost) {
            this.showToast('金币不足!', 'warning');
            return;
        }
        
        gameState.gold -= cost;
        gameState.skills[skillId] = currentLevel + 1;
        
        if (skill.type === 'passive') {
            if (skillId === 'strength') {
                gameState.atk += skill.effect(1);
            } else if (skillId === 'shield') {
                gameState.def += skill.effect(1);
            }
        }
        
        this.showToast(`${skill.name} 升级到 Lv.${currentLevel + 1}`, 'success');
        this.updateUI();
        this.checkAchievements();
    }
    
    checkAchievements() {
        ACHIEVEMENTS.forEach(achievement => {
            if (!gameState.achievements.includes(achievement.id) && achievement.condition(gameState)) {
                gameState.achievements.push(achievement.id);
                
                if (achievement.reward.gold) {
                    this.gainGold(achievement.reward.gold);
                }
                if (achievement.reward.gem) {
                    gameState.gem += achievement.reward.gem;
                }
                
                this.showToast(`成就解锁: ${achievement.name}`, 'success');
            }
        });
    }
    
    buyItem(itemId) {
        const shopItem = SHOP_ITEMS.find(i => i.id === itemId);
        if (!shopItem) return;
        
        const item = ITEMS.find(i => i.id === itemId);
        
        if (shopItem.currency === 'gold' && gameState.gold < shopItem.price) {
            this.showToast('金币不足!', 'warning');
            return;
        }
        if (shopItem.currency === 'gem' && gameState.gem < shopItem.price) {
            this.showToast('宝石不足!', 'warning');
            return;
        }
        
        if (shopItem.currency === 'gold') {
            gameState.gold -= shopItem.price;
        } else {
            gameState.gem -= shopItem.price;
        }
        
        if (!gameState.inventory[itemId]) {
            gameState.inventory[itemId] = 0;
        }
        gameState.inventory[itemId]++;
        
        this.showToast(`购买成功: ${item.name}`, 'success');
        this.updateUI();
    }
    
    useItem(itemId) {
        if (!gameState.inventory[itemId] || gameState.inventory[itemId] <= 0) {
            this.showToast('物品不足', 'warning');
            return;
        }
        
        const item = ITEMS.find(i => i.id === itemId);
        if (!item) return;
        
        if (item.effect === 'heal_50') {
            gameState.hp = Math.min(gameState.maxHp, gameState.hp + 50);
            this.showToast('生命值恢复50点', 'success');
        } else if (item.effect === 'energy_50') {
            gameState.energy = Math.min(gameState.maxEnergy, gameState.energy + 50);
            this.showToast('能量恢复50点', 'success');
        } else if (item.effect === 'exp_100') {
            this.gainExp(100);
            this.showToast('获得100点经验', 'success');
        } else if (item.effect === 'gem_10') {
            gameState.gem += 10;
            this.showToast('获得10颗宝石', 'success');
        }
        
        gameState.inventory[itemId]--;
        if (gameState.inventory[itemId] <= 0) {
            delete gameState.inventory[itemId];
        }
        
        this.updateUI();
    }
    
    setupEventListeners() {
        document.getElementById('cultivate-btn').addEventListener('click', () => {
            this.cultivate();
        });
        
        document.getElementById('auto-cultivate-btn').addEventListener('click', () => {
            gameState.autoCultivate = !gameState.autoCultivate;
            this.updateUI();
            this.showToast(gameState.autoCultivate ? '自动修炼已开启' : '自动修炼已关闭', 'success');
        });
        
        document.getElementById('battle-btn').addEventListener('click', () => {
            if (gameState.currentEnemy) {
                this.showToast('当前有战斗进行中', 'warning');
                return;
            }
            this.startBattle();
        });
        
        document.getElementById('assign-stats-btn').addEventListener('click', () => {
            this.showAssignStatsModal();
        });
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                this.switchTab(e.target.closest('.nav-btn').dataset.tab);
            });
        });
        
        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('modal-overlay').style.display = 'none';
        });
        
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-overlay')) {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        });
    }
    
    switchTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.tab === tab) {
                btn.classList.add('active');
            }
        });
        
        this.showModal(tab);
    }
    
    showModal(content) {
        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        
        switch (content) {
            case 'cultivation':
                modal.style.display = 'none';
                return;
            case 'skills':
                this.showSkillsModal(body);
                break;
            case 'inventory':
                this.showInventoryModal(body);
                break;
            case 'achievements':
                this.showAchievementsModal(body);
                break;
            case 'shop':
                this.showShopModal(body);
                break;
            case 'settings':
                this.showSettingsModal(body);
                break;
        }
        
        modal.style.display = 'flex';
    }
    
    showSkillsModal(body) {
        body.innerHTML = '<h2><i class="fas fa-star"></i> 技能树</h2>';
        
        SKILLS.forEach(skill => {
            const level = gameState.skills[skill.id] || 0;
            const cost = skill.cost(level + 1);
            const canUpgrade = level < skill.maxLevel && gameState.gold >= cost;
            
            const skillDiv = document.createElement('div');
            skillDiv.className = 'skill-item';
            skillDiv.style.marginBottom = '10px';
            skillDiv.onclick = () => this.upgradeSkill(skill.id);
            
            skillDiv.innerHTML = `
                <div class="skill-icon">${skill.icon}</div>
                <div class="skill-info">
                    <div class="skill-name">${skill.name} (Lv.${level}/${skill.maxLevel})</div>
                    <div class="skill-desc">${skill.desc}</div>
                    <div style="font-size:0.8em;color:var(--金箔);">升级费用: ${this.formatNumber(cost)} 金币</div>
                </div>
                <button class="btn-small" style="${canUpgrade ? '' : 'opacity:0.5;'}" ${canUpgrade ? '' : 'disabled'}>
                    ${level >= skill.maxLevel ? '已满级' : '升级'}
                </button>
            `;
            
            body.appendChild(skillDiv);
        });
    }
    
    showInventoryModal(body) {
        body.innerHTML = '<h2><i class="fas fa-backpack"></i> 背包</h2>';
        
        const items = Object.entries(gameState.inventory);
        if (items.length === 0) {
            body.innerHTML += '<p style="color:var(--text-secondary);">背包为空</p>';
            return;
        }
        
        items.forEach(([itemId, quantity]) => {
            const item = ITEMS.find(i => i.id === itemId);
            if (!item) return;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item-item';
            itemDiv.style.marginBottom = '10px';
            itemDiv.onclick = () => this.useItem(itemId);
            
            itemDiv.innerHTML = `
                <div class="item-icon">${item.icon}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-quantity">x${quantity}</div>
            `;
            
            body.appendChild(itemDiv);
        });
    }
    
    showAchievementsModal(body) {
        body.innerHTML = '<h2><i class="fas fa-trophy"></i> 成就</h2>';
        
        ACHIEVEMENTS.forEach(achievement => {
            const unlocked = gameState.achievements.includes(achievement.id);
            
            const achDiv = document.createElement('div');
            achDiv.className = `achievement-item ${unlocked ? 'unlocked' : ''}`;
            achDiv.style.marginBottom = '10px';
            
            achDiv.innerHTML = `
                <div class="achievement-icon">${achievement.icon}</div>
                <div class="achievement-info">
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                    ${unlocked ? '<div style="font-size:0.8em;color:var(--金箔);">已解锁</div>' : ''}
                </div>
            `;
            
            body.appendChild(achDiv);
        });
    }
    
    showShopModal(body) {
        body.innerHTML = '<h2><i class="fas fa-store"></i> 商店</h2>';
        
        const shopGrid = document.createElement('div');
        shopGrid.className = 'shop-grid';
        
        SHOP_ITEMS.forEach(item => {
            const itemData = ITEMS.find(i => i.id === item.id);
            const canBuy = item.currency === 'gold' ? gameState.gold >= item.price : gameState.gem >= item.price;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'shop-item';
            itemDiv.onclick = () => this.buyItem(item.id);
            
            itemDiv.innerHTML = `
                <div class="shop-item-icon">${itemData.icon}</div>
                <div class="shop-item-name">${itemData.name}</div>
                <div class="shop-item-price">${item.currency === 'gold' ? '💰' : '💎'} ${this.formatNumber(item.price)}</div>
            `;
            
            shopGrid.appendChild(itemDiv);
        });
        
        body.appendChild(shopGrid);
    }
    
    showSettingsModal(body) {
        body.innerHTML = '<h2><i class="fas fa-cog"></i> 设置</h2>';
        
        const settings = [
            { id: 'sound', name: '音效', desc: '开启游戏音效' },
            { id: 'autoSave', name: '自动保存', desc: '每30秒自动保存游戏' },
            { id: 'animations', name: '动画效果', desc: '开启UI动画效果' },
        ];
        
        settings.forEach(setting => {
            const div = document.createElement('div');
            div.className = 'setting-item';
            
            div.innerHTML = `
                <div>
                    <div class="setting-label">${setting.name}</div>
                    <div style="font-size:0.85em;color:var(--text-secondary);">${setting.desc}</div>
                </div>
                <label class="switch">
                    <input type="checkbox" ${gameState.settings[setting.id] ? 'checked' : ''} onchange="game.toggleSetting('${setting.id}')">
                    <span class="slider"></span>
                </label>
            `;
            
            body.appendChild(div);
        });
        
        const saveBtn = document.createElement('button');
        saveBtn.className = 'btn-small';
        saveBtn.style.marginTop = '20px';
        saveBtn.textContent = '<i class="fas fa-save"></i> 手动保存';
        saveBtn.onclick = () => this.saveGame();
        body.appendChild(saveBtn);
        
        const resetBtn = document.createElement('button');
        resetBtn.className = 'btn-small';
        resetBtn.style.marginTop = '10px';
        resetBtn.style.borderColor = 'var(--danger)';
        resetBtn.style.color = 'var(--danger)';
        resetBtn.textContent = '<i class="fas fa-trash"></i> 重置游戏';
        resetBtn.onclick = () => {
            if (confirm('确定要重置游戏吗? 此操作不可撤销!')) {
                localStorage.removeItem(CONFIG.SAVE_KEY);
                location.reload();
            }
        };
        body.appendChild(resetBtn);
    }
    
    showAssignStatsModal() {
        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        
        body.innerHTML = '<h2><i class="fas fa-chart-bar"></i> 分配属性点</h2>';
        body.innerHTML += `<p>可分配点数: <strong style="color:var(--accent);">${gameState.freePoints}</strong></p>`;
        
        const stats = [
            { id: 'hp', name: '<i class="fas fa-heart"></i> 生命', desc: '每点+20生命', cost: 1 },
            { id: 'atk', name: '<i class="fas fa-fist-raised"></i> 攻击', desc: '每点+2攻击', cost: 1 },
            { id: 'def', name: '<i class="fas fa-shield-alt"></i> 防御', desc: '每点+1防御', cost: 1 },
            { id: 'spd', name: '<i class="fas fa-bolt"></i> 速度', desc: '每点+1速度', cost: 1 },
            { id: 'luck', name: '<i class="fas fa-clover"></i> 幸运', desc: '每点+1幸运', cost: 2 },
            { id: 'comp', name: '<i class="fas fa-lightbulb"></i> 悟性', desc: '每点+1悟性', cost: 2 },
        ];
        
        stats.forEach(stat => {
            const div = document.createElement('div');
            div.className = 'setting-item';
            div.onclick = () => this.assignStat(stat.id, stat.cost);
            
            div.innerHTML = `
                <div>
                    <div class="setting-label">${stat.name}</div>
                    <div style="font-size:0.85em;color:var(--text-secondary);">${stat.desc}</div>
                </div>
                <button class="btn-small" ${gameState.freePoints >= stat.cost ? '' : 'disabled'}>
                    升级 (${stat.cost}点)
                </button>
            `;
            
            body.appendChild(div);
        });
        
        modal.style.display = 'flex';
    }
    
    assignStat(statId, cost) {
        if (gameState.freePoints < cost) {
            this.showToast('属性点不足!', 'warning');
            return;
        }
        
        gameState.freePoints -= cost;
        
        switch (statId) {
            case 'hp':
                gameState.maxHp += 20;
                gameState.hp += 20;
                break;
            case 'atk':
                gameState.atk += 2;
                break;
            case 'def':
                gameState.def += 1;
                break;
            case 'spd':
                gameState.spd += 1;
                break;
            case 'luck':
                gameState.luck += 1;
                break;
            case 'comp':
                gameState.comprehension += 1;
                break;
        }
        
        this.showToast(`属性提升!`, 'success');
        this.updateUI();
        this.showAssignStatsModal();
    }
    
    toggleSetting(settingId) {
        gameState.settings[settingId] = !gameState.settings[settingId];
        this.showToast(`${settingId} ${gameState.settings[settingId] ? '已开启' : '已关闭'}`, 'success');
    }
    
    startGameLoop() {
        setInterval(() => {
            if (gameState.autoCultivate && gameState.energy > 0) {
                this.cultivate();
            }
        }, CONFIG.AUTO_CULTIVATE_INTERVAL);
        
        setInterval(() => {
            if (gameState.energy < gameState.maxEnergy) {
                gameState.energy = Math.min(gameState.maxEnergy, gameState.energy + 1);
                this.updateUI();
            }
        }, CONFIG.ENERGY_REGEN_RATE * 1000);
        
        setInterval(() => {
            if (gameState.settings.autoSave) {
                this.saveGame();
            }
        }, CONFIG.SAVE_INTERVAL);
        
        setInterval(() => {
            gameState.stats.lastOnlineTime = Date.now();
        }, 10000);
    }
    
    setupUI() {
        this.updateUI();
        this.updateEnemyDisplay();
    }
    
    formatNumber(num) {
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
        }
        if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'K';
        }
        return num.toString();
    }
    
    formatTime(seconds) {
        if (seconds < 60) return `${Math.floor(seconds)}秒`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}分钟`;
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        return `${hours}小时${minutes}分钟`;
    }
    
    showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
    
    showFloatingText(text, color) {
        if (!gameState.settings.animations) return;
        
        const float = document.createElement('div');
        float.className = 'floating-text';
        float.textContent = text;
        float.style.color = color;
        float.style.left = '50%';
        float.style.top = '50%';
        float.style.transform = 'translate(-50%, -50%)';
        
        document.getElementById('character-section').appendChild(float);
        
        setTimeout(() => {
            float.remove();
        }, 1000);
    }
    
    showLevelUpAnimation() {
        if (!gameState.settings.animations) return;
        
        const avatar = document.querySelector('.avatar-circle');
        avatar.classList.add('level-up');
        
        setTimeout(() => {
            avatar.classList.remove('level-up');
        }, 500);
    }
    
    addBattleLog(message) {
        const log = document.getElementById('battle-log');
        const msg = document.createElement('div');
        msg.className = 'battle-message';
        msg.textContent = message;
        
        log.appendChild(msg);
        log.scrollTop = log.scrollHeight;
        
        while (log.children.length > 10) {
            log.removeChild(log.firstChild);
        }
    }
}

// ==================== 启动游戏 ====================
let game;

document.addEventListener('DOMContentLoaded', () => {
    game = new Game();
    window.game = game;
});
    </script>
</body>
