<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放置修仙 - 完整版</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
    --ink-black: #0d0d0d;
    --paper-color: #e6e1d3;
    --gold-accent: #d4af37;
    --jade-green: #3a5a40;
    --vermilion: #8b0000;
    --bg-primary: var(--ink-black);
    --text-primary: #333;
    --text-on-dark: #d4d4d4;
    --accent: var(--gold-accent);
    --danger: #c0392b;
    --success: #27ae60;
    --warning: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Noto Serif SC',serif;
    background:var(--bg-primary); color:var(--text-on-dark);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow-x:hidden;
    background-image:radial-gradient(circle at 50% 50%,#1a1a1a 0%,#0d0d0d 100%),url('https://www.transparenttextures.com/patterns/dark-matter.png');
}
.mist-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:url('https://www.transparenttextures.com/patterns/natural-paper.png'); opacity:0.1; pointer-events:none; z-index:0; }
#scroll-container { position:relative; width:95%; max-width:1300px; min-height:85vh; margin:30px auto; display:flex; z-index:10; }
.scroll-rod { width:40px; background:linear-gradient(to right,#4a3728,#7a5c48 50%,#4a3728); border-radius:5px; box-shadow:5px 0 15px rgba(0,0,0,0.5); position:relative; flex-shrink:0; }
.scroll-rod::before, .scroll-rod::after { content:''; position:absolute; left:-5px; width:50px; height:50px; background:radial-gradient(circle,var(--gold-accent),#8b7355); border-radius:50%; border:2px solid #4a3728; }
.scroll-rod::before { top:-25px; }
.scroll-rod::after { bottom:-25px; }
.scroll-paper {
    background-color:var(--paper-color); background-image:url('https://www.transparenttextures.com/patterns/handmade-paper.png');
    flex:1; padding:30px; box-shadow:inset 0 0 50px rgba(0,0,0,0.2),10px 10px 30px rgba(0,0,0,0.5);
    border-left:2px solid #ccc; border-right:2px solid #ccc; display:grid; grid-template-columns:320px 1fr; gap:30px; color:var(--text-primary); overflow-y:auto; max-height:90vh;
}
#char-display-area { display:flex; flex-direction:column; align-items:center; border-right:1px solid rgba(0,0,0,0.1); padding-right:20px; }
.avatar-frame {
    width:200px; height:200px;
    background:url("data:image/svg+xml,%3Csvg width='208' height='208' viewBox='0 0 208 208' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='104' cy='104' r='100' fill='none' stroke='%23d4af37' stroke-width='4'/%3E%3C/svg%3E") center/contain no-repeat;
    display:flex; align-items:center; justify-content:center; position:relative;
    filter:drop-shadow(0 0 10px rgba(212,175,55,0.3));
}
.avatar-img { width:150px; height:150px; border-radius:50%; object-fit:cover; border:3px double var(--gold-accent); }
.realm-badge { font-family:'Ma Shan Zheng',cursive; font-size:2em; color:var(--vermilion); margin-top:12px; border-bottom:2px solid var(--vermilion); padding:0 18px; }
.char-name { font-family:'Ma Shan Zheng',cursive; font-size:1.6em; margin:8px 0; letter-spacing:4px; }
.stats-grid { width:100%; margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-tag { background:rgba(139,0,0,0.06); border:1px solid rgba(139,0,0,0.12); padding:7px 10px; display:flex; justify-content:space-between; font-size:0.88em; border-radius:2px; }
.stat-tag .val { color:var(--vermilion); font-weight:bold; }
.progress-ink-container { width:100%; height:12px; background:rgba(0,0,0,0.08); border-radius:6px; overflow:hidden; margin:5px 0; }
.progress-ink-fill { height:100%; background:var(--vermilion); transition:width 0.3s; box-shadow:0 0 8px rgba(139,0,0,0.4); }
#content-area { display:flex; flex-direction:column; gap:15px; }
.section-header { font-family:'Ma Shan Zheng',cursive; font-size:1.4em; border-bottom:1px solid #ccc; padding-bottom:5px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
.resource-bar { display:flex; gap:20px; background:rgba(0,0,0,0.05); padding:10px 18px; border-radius:5px; margin-bottom:8px; }
.resource-item { font-weight:bold; color:var(--jade-green); font-size:1.05em; }
.resource-item i { margin-right:4px; }
.action-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
.main-btn {
    background:#fff; background-image:url('https://www.transparenttextures.com/patterns/natural-paper.png');
    border:2px solid #555; padding:18px 15px; font-family:'Ma Shan Zheng',cursive; font-size:1.3em;
    cursor:pointer; transition:all 0.3s; position:relative; box-shadow:3px 3px 0px #333; text-align:center;
}
.main-btn:hover { transform:translate(-2px,-2px); box-shadow:5px 5px 0px var(--vermilion); border-color:var(--vermilion); color:var(--vermilion); }
.main-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0px #333; }
.main-btn .hint { font-size:0.55em; margin-top:4px; opacity:0.7; }
.main-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:1px 1px 0px #333; }
.btn-small { width:100%; padding:8px; margin-top:8px; background:rgba(0,0,0,0.05); border:1px solid #999; border-radius:4px; cursor:pointer; font-family:inherit; font-size:0.9em; transition:all 0.2s; }
.btn-small:hover { background:var(--vermilion); color:#fff; border-color:var(--vermilion); }
.enemy-card { display:flex; gap:15px; align-items:center; background:rgba(0,0,0,0.05); padding:12px 15px; border-radius:5px; }
.enemy-card.boss-card { background:rgba(139,0,0,0.08); border:2px solid var(--vermilion); }
.enemy-avatar { font-size:2.5em; }
.enemy-info { flex:1; }
.battle-log { background:rgba(255,255,255,0.6); border:1px solid #ddd; height:120px; overflow-y:auto; padding:10px; font-size:0.85em; line-height:1.7; border-radius:5px; margin-top:8px; }
.battle-msg { padding:2px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
.battle-msg.crit { color:var(--vermilion); font-weight:bold; }
.battle-msg.player-act { color:var(--jade-green); }
.battle-msg.enemy-act { color:var(--danger); }
.battle-msg.system { color:var(--gold-accent); font-style:italic; }
#battle-actions { display:none; gap:8px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
#battle-actions .ba-btn {
    padding:10px 16px; background:#fff; border:2px solid #555; border-radius:4px;
    font-family:'Ma Shan Zheng',cursive; font-size:1.1em; cursor:pointer; transition:all 0.2s;
}
#battle-actions .ba-btn:hover { border-color:var(--vermilion); color:var(--vermilion); transform:translateY(-2px); }
#battle-actions .ba-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
#bottom-selector { display:flex; justify-content:center; gap:12px; margin-top:15px; flex-wrap:wrap; }
.nav-talisman {
    min-width:70px; padding:10px 14px; background:#fff; border:1px solid #555;
    font-family:'Ma Shan Zheng',cursive; font-size:1.1em; cursor:pointer; transition:all 0.3s; text-align:center;
    clip-path:polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
}
.nav-talisman:hover, .nav-talisman.active { background:var(--vermilion); color:#fff; border-color:var(--gold-accent); }
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-content {
    background:var(--paper-color); background-image:url('https://www.transparenttextures.com/patterns/handmade-paper.png');
    padding:25px 30px; width:92%; max-width:580px; border:4px double #4a3728; max-height:80vh; overflow-y:auto; color:var(--text-primary); border-radius:4px; position:relative;
}
.modal-close { position:absolute; top:10px; right:15px; font-size:1.8em; cursor:pointer; color:#999; line-height:1; }
.modal-close:hover { color:var(--vermilion); }
.panel-list-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(0,0,0,0.04); border-radius:5px; margin-bottom:7px; font-size:0.92em; transition:background 0.2s; cursor:pointer; }
.panel-list-item:hover { background:rgba(139,0,0,0.08); }
.panel-list-item .icon { font-size:1.4em; min-width:30px; text-align:center; }
.panel-list-item .info { flex:1; }
.panel-list-item .name { font-weight:bold; }
.panel-list-item .desc { font-size:0.85em; color:#666; }
.panel-list-item .action { color:var(--gold-accent); font-weight:bold; font-size:0.9em; }
.shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-top:15px; }
.shop-item { background:rgba(0,0,0,0.04); padding:15px 10px; border-radius:6px; text-align:center; cursor:pointer; transition:all 0.2s; border:2px solid transparent; }
.shop-item:hover { border-color:var(--gold-accent); transform:translateY(-2px); }
.shop-item .item-icon { font-size:2.5em; margin-bottom:8px; }
.shop-item .price { color:var(--gold-accent); font-weight:bold; font-size:0.9em; }
#toast-container { position:fixed; top:20px; right:20px; z-index:3000; }
.toast { padding:12px 18px; background:var(--paper-color); color:var(--text-primary); border:1px solid var(--gold-accent); border-radius:6px; margin-bottom:8px; animation:slideIn 0.3s ease; max-width:300px; font-size:0.95em; box-shadow:2px 2px 10px rgba(0,0,0,0.3); }
@keyframes slideIn { from{opacity:0;transform:translateX(80px);} to{opacity:1;transform:translateX(0);} }
@keyframes floatUp { from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-50px);} }
.floating-text { position:absolute; animation:floatUp 1s ease forwards; font-weight:bold; pointer-events:none; z-index:10; }
.realm-break-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,0); pointer-events:none; transition:background 0.5s;
}
.realm-break-overlay.active { background:rgba(0,0,0,0.85); pointer-events:auto; }
.realm-break-text {
    font-family:'Ma Shan Zheng',cursive; font-size:4em; color:var(--gold-accent);
    opacity:0; transform:scale(0.5); transition:all 0.8s ease;
    text-shadow:0 0 30px rgba(212,175,55,0.8);
}
.realm-break-overlay.active .realm-break-text { opacity:1; transform:scale(1); }
.realm-break-sub {
    font-family:'Ma Shan Zheng',cursive; font-size:1.5em; color:#fff;
    opacity:0; transition:opacity 0.5s 0.6s;
}
.realm-break-overlay.active .realm-break-sub { opacity:0.8; }
@media (max-width:900px) {
    .scroll-paper { grid-template-columns:1fr; }
    #char-display-area { border-right:none; border-bottom:1px solid rgba(0,0,0,0.1); padding-bottom:15px; padding-right:0; margin-bottom:15px; }
    .scroll-rod { width:100%; height:30px; background:linear-gradient(to bottom,#4a3728,#7a5c48 50%,#4a3728); }
    .scroll-rod::before { top:-5px; left:-20px; width:40px; height:40px; }
    .scroll-rod::after { bottom:auto; top:-5px; right:-20px; left:auto; width:40px; height:40px; }
    #scroll-container { flex-direction:column; }
    .action-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="mist-overlay"></div>

<!-- 境界突破特效层 -->
<div class="realm-break-overlay" id="realm-break-overlay">
    <div class="realm-break-text" id="realm-break-text"></div>
    <div class="realm-break-sub" id="realm-break-sub"></div>
</div>

<div id="game-root">
<div id="scroll-container">
<div class="scroll-rod"></div>
<div class="scroll-paper">
<aside id="char-display-area">
<div class="avatar-frame"><img class="avatar-img" src="avatar.png" alt="修仙者头像"></div>
<div class="realm-badge" id="realm">凡人</div>
<div class="char-name" id="char-name">修行者</div>
<div style="width:100%;margin:8px 0;">
<div style="display:flex;justify-content:space-between;font-size:0.78em;margin-bottom:2px;"><span>灵力进度</span><span id="exp-text">0/100</span></div>
<div class="progress-ink-container"><div class="progress-ink-fill" id="exp-fill" style="width:0%"></div></div>
</div>
<div class="stats-grid">
<div class="stat-tag"><span><i class="fas fa-heart" style="color:#c0392b;"></i> 生命</span><span class="val" id="stat-hp">100</span></div>
<div class="stat-tag"><span><i class="fas fa-crosshairs" style="color:#555;"></i> 攻击</span><span class="val" id="stat-atk">10</span></div>
<div class="stat-tag"><span><i class="fas fa-shield-alt" style="color:#555;"></i> 防御</span><span class="val" id="stat-def">5</span></div>
<div class="stat-tag"><span><i class="fas fa-bolt" style="color:#f39c12;"></i> 速度</span><span class="val" id="stat-spd">10</span></div>
<div class="stat-tag"><span><i class="fas fa-clover" style="color:#27ae60;"></i> 幸运</span><span class="val" id="stat-luck">1</span><span style="font-size:0.7em;color:#999;" id="luck-tip"></span></div>
<div class="stat-tag"><span><i class="fas fa-star" style="color:#f39c12;"></i> 悟性</span><span class="val" id="stat-comp">1</span><span style="font-size:0.7em;color:#999;" id="comp-tip"></span></div>
</div>
<button class="btn-small" id="assign-stats-btn">分配点数（剩余 <span id="free-points-num">0</span> 点）</button>
</aside>
<section id="content-area">
<div class="resource-bar">
<div class="resource-item"><i class="fas fa-coins"></i> <span id="gold">0</span></div>
<div class="resource-item"><i class="fas fa-gem"></i> <span id="gem">0</span></div>
<div class="resource-item"><i class="fas fa-bolt"></i> <span id="energy">100/100</span></div>
<div class="resource-item" style="margin-left:auto;font-size:0.85em;color:#888;" id="save-status">已保存</div>
</div>
<div id="tab-cultivation">
<div class="section-header">仙路修行</div>
<div class="action-grid">
<button class="main-btn" id="cultivate-btn"><i class="fas fa-leaf" style="display:block;font-size:1.6em;"></i>修炼<div class="hint">点击吐纳灵气</div></button>
<button class="main-btn" id="auto-cultivate-btn"><i class="fas fa-sync" style="display:block;font-size:1.6em;"></i>闭关<div class="hint" id="auto-status">未开启</div></button>
</div>
<div class="section-header" style="margin-top:25px;">历练挑战</div>
<!-- 敌人显示区 -->
<div class="enemy-card" id="enemy-card">
<div class="enemy-avatar" id="enemy-emoji"><i class="fas fa-paw"></i></div>
<div class="enemy-info">
<div style="display:flex;align-items:center;gap:8px;">
    <span id="enemy-name" style="font-weight:bold;">灰狼</span>
    <span id="enemy-type-tag" style="font-size:0.7em;padding:2px 6px;border-radius:3px;display:none;"></span>
</div>
<div class="progress-ink-container"><div class="progress-ink-fill" id="enemy-hp-fill" style="width:100%"></div></div>
<div id="enemy-hp-text" style="font-size:0.8em;text-align:right;">50/50</div>
</div>
</div>
<!-- Boss 战斗操作栏 -->
<div id="battle-actions">
    <button class="ba-btn" id="ba-attack"><i class="fas fa-crosshairs"></i> 攻击</button>
    <button class="ba-btn" id="ba-skill"><i class="fas fa-fire"></i> 技能</button>
    <button class="ba-btn" id="ba-item"><i class="fas fa-flask"></i> 道具</button>
    <button class="ba-btn" id="ba-flee"><i class="fas fa-running"></i> 逃跑</button>
</div>
<button class="main-btn" id="battle-btn" style="margin-top:10px;grid-column:1/-1;"><i class="fas fa-crosshairs" style="display:block;font-size:1.4em;"></i>斩妖除魔</button>
<div class="battle-log" id="battle-log"><div class="battle-msg system">欢迎来到放置修仙世界，道友。</div></div>
</div>
<div id="bottom-selector">
<div class="nav-talisman active" data-tab="cultivation">修行</div>
<div class="nav-talisman" data-tab="skills">神通</div>
<div class="nav-talisman" data-tab="inventory">宝库</div>
<div class="nav-talisman" data-tab="achievements">功德</div>
<div class="nav-talisman" data-tab="shop">灵坊</div>
<div class="nav-talisman" data-tab="settings">仙机</div>
</div>
</section>
</div>
<div class="scroll-rod"></div>
</div>
</div>

<div class="modal-overlay" id="modal-overlay">
<div class="modal-content">
<span class="modal-close" id="modal-close">&times;</span>
<div id="modal-body"></div>
</div>
</div>
<div id="toast-container"></div>

<script>
/* ========== 配置 ========== */
var CONFIG = {
    SAVE_KEY: 'cultivation_save',
    SAVE_INTERVAL: 30000,
    AUTO_CULTIVATE_INTERVAL: 1000,
    OFFLINE_MAX_HOURS: 8,
    ENERGY_REGEN_RATE: 5,
    BATTLE_TICK: 800,
    EXP_GROWTH_RATE: 1.3,     // 升级经验倍率（原1.5→1.3）
    ENEMY_UNLOCK_STEP: 5,     // 每5级解锁新敌人（原10）
};

/* ========== 境界 ========== */
var REALMS = [
    { name:'凡人', level:1, color:'#888' },
    { name:'练气期', level:5, color:'#64ffda' },
    { name:'筑基期', level:10, color:'#3498db' },
    { name:'金丹期', level:20, color:'#9b59b6' },
    { name:'元婴期', level:35, color:'#e74c3c' },
    { name:'化神期', level:50, color:'#ffd700' },
    { name:'炼虚期', level:70, color:'#ff6b6b' },
    { name:'合体期', level:90, color:'#1abc9c' },
    { name:'大乘期', level:120, color:'#a8e6cf' },
    { name:'渡劫期', level:150, color:'#f1c40f' },
    { name:'仙人', level:200, color:'#ffffff' },
];

/* ========== 技能 ========== */
var SKILLS = [
    { id:'fireball', name:'火球术', icon:'<i class="fas fa-fire"></i>', desc:'对敌人造成1.8倍攻击伤害', maxLevel:10, cost:function(l){return l*100;}, effect:function(l){return 1.8+l*0.2;}, type:'attack', energyCost:10 },
    { id:'heal', name:'治愈术', icon:'<i class="fas fa-heart"></i>', desc:'恢复生命值', maxLevel:10, cost:function(l){return l*80;}, effect:function(l){return 30+l*15;}, type:'heal', energyCost:8 },
    { id:'meditation', name:'冥想', icon:'<i class="fas fa-leaf"></i>', desc:'提升修炼速度', maxLevel:10, cost:function(l){return l*120;}, effect:function(l){return 1+l*0.1;}, type:'cultivation', energyCost:0 },
    { id:'strength', name:'力量强化', icon:'<i class="fas fa-dumbbell"></i>', desc:'永久提升攻击力', maxLevel:10, cost:function(l){return l*150;}, effect:function(l){return l*3;}, type:'passive', energyCost:0 },
    { id:'shield', name:'护盾术', icon:'<i class="fas fa-shield-alt"></i>', desc:'永久提升防御力', maxLevel:10, cost:function(l){return l*130;}, effect:function(l){return l*2;}, type:'passive', energyCost:0 },
    { id:'double_exp', name:'双倍经验', icon:'<i class="fas fa-star"></i>', desc:'修炼获得额外经验', maxLevel:5, cost:function(l){return l*500;}, effect:function(l){return 1+l*0.5;}, type:'cultivation', energyCost:0 },
];

/* ========== 敌人（isBoss区分小怪/Boss） ========== */
var ENEMIES = [
    // 小怪：自动战斗
    { id:'wolf', name:'灰狼', icon:'<i class="fas fa-paw"></i>', hp:50, atk:8, def:2, exp:20, gold:10, isBoss:false },
    { id:'boar', name:'野猪', icon:'<i class="fas fa-horse"></i>', hp:80, atk:12, def:5, exp:35, gold:20, isBoss:false },
    { id:'snake', name:'毒蛇', icon:'<i class="fas fa-staff-snake"></i>', hp:40, atk:15, def:1, exp:25, gold:15, isBoss:false },
    { id:'bear', name:'棕熊', icon:'<i class="fas fa-paw"></i>', hp:150, atk:20, def:10, exp:60, gold:40, isBoss:false },
    { id:'tiger', name:'猛虎', icon:'<i class="fas fa-paw"></i>', hp:200, atk:30, def:15, exp:100, gold:70, isBoss:false },
    // Boss：手动回合制
    { id:'dragon', name:'幼龙', icon:'<i class="fas fa-dragon"></i>', hp:500, atk:50, def:30, exp:300, gold:200, isBoss:true },
    { id:'demon', name:'魔将', icon:'<i class="fas fa-skull"></i>', hp:800, atk:70, def:40, exp:500, gold:400, isBoss:true },
    { id:'ancient', name:'上古妖王', icon:'<i class="fas fa-spider"></i>', hp:1500, atk:100, def:60, exp:1000, gold:800, isBoss:true },
];

/* ========== 游戏状态 ========== */
var gameState = {
    level:1, exp:0, expToNext:100, realm:'凡人',
    gold:0, gem:0, energy:100, maxEnergy:100,
    hp:100, maxHp:100, atk:10, def:5, spd:10, luck:1, comprehension:1,
    freePoints:0, skills:{}, equipment:{weapon:null,armor:null},
    inventory:{}, achievements:[],
    currentEnemy:null, autoCultivate:false,
    battleMode:null, // 'auto' | 'manual' | null
    battleTurn:'player', // 手动战斗回合
    playerActionLock:false,
    stats:{
        totalCultivations:0, totalBattles:0, totalWins:0,
        totalGold:0, totalExp:0, totalDeaths:0, bossKills:0,
        totalCrits:0,
        startTime:Date.now(), lastSaveTime:Date.now(), lastOnlineTime:Date.now(),
    },
    settings:{ sound:true, autoSave:true, animations:true },
};

/* ========== 核心类 ========== */
function Game() { this.init(); }

Game.prototype.init = function() {
    this.loadGame();
    this.bindEvents();
    this.startLoops();
    this.checkOfflineEarnings();
    this.updateUI();
    this.updatePreviewEnemy();
};

/* ---- 存档 ---- */
Game.prototype.loadGame = function() {
    var saved = localStorage.getItem(CONFIG.SAVE_KEY);
    if (saved) {
        try {
            var parsed = JSON.parse(saved);
            gameState = this.mergeDeep(gameState, parsed);
        } catch(e) { console.error('加载失败', e); }
    }
};

Game.prototype.saveGame = function(silent) {
    try {
        gameState.stats.lastSaveTime = Date.now();
        localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(gameState));
        if (!silent) this.showToast('游戏已保存', 'success');
        document.getElementById('save-status').textContent = '已保存 ' + new Date().toLocaleTimeString();
    } catch(e) { if (!silent) this.showToast('保存失败', 'error'); }
};

Game.prototype.mergeDeep = function(target, source) {
    var out = {};
    for (var k in target) { out[k] = target[k]; }
    if (this.isObj(target) && this.isObj(source)) {
        var self = this;
        Object.keys(source).forEach(function(k) {
            if (self.isObj(source[k]) && k in target) {
                out[k] = self.mergeDeep(target[k], source[k]);
            } else {
                out[k] = source[k];
            }
        });
    }
    return out;
};

Game.prototype.isObj = function(i) { return i && typeof i==='object' && !Array.isArray(i); };

/* ---- 离线收益（无论autoCultivate状态，都有基础收益） ---- */
Game.prototype.checkOfflineEarnings = function() {
    var last = gameState.stats.lastOnlineTime;
    var now = Date.now();
    var offSec = (now - last) / 1000;
    if (offSec > 60) {
        var maxSec = CONFIG.OFFLINE_MAX_HOURS * 3600;
        var effSec = Math.min(offSec, maxSec);
        var mins = Math.floor(effSec / 60);
        var base = 10 * this.getCultivationMultiplier();
        // 闭关状态2倍收益，否则0.5倍基础收益（放置游戏底线）
        var rate = gameState.autoCultivate ? 1.0 : 0.25;
        var expGain = Math.floor(base * mins * rate);
        var goldGain = Math.floor(expGain * 0.3);
        if (expGain > 0) {
            this.gainExp(expGain);
            this.gainGold(goldGain);
            var label = gameState.autoCultivate ? '闭关收益' : '离线收益';
            this.showToast(label+': '+expGain+'经验, '+goldGain+'金币', 'success');
        }
    }
    gameState.stats.lastOnlineTime = now;
};

/* ---- 修炼倍率（悟性参与计算） ---- */
Game.prototype.getCultivationMultiplier = function() {
    var m = 1;
    // 悟性加成：每点悟性+5%经验
    m *= (1 + gameState.comprehension * 0.05);
    // 冥想技能
    var ml = gameState.skills['meditation']||0;
    if (ml>0) m *= SKILLS.filter(function(s){return s.id==='meditation';})[0].effect(ml);
    // 双倍经验技能
    var dl = gameState.skills['double_exp']||0;
    if (dl>0) m *= SKILLS.filter(function(s){return s.id==='double_exp';})[0].effect(dl);
    return m;
};

/* ---- 修炼 ---- */
Game.prototype.cultivate = function() {
    if (gameState.energy <= 0) { this.showToast('体力耗尽', 'warning'); return; }
    gameState.energy = Math.max(0, gameState.energy-1);
    gameState.stats.totalCultivations++;
    var gain = Math.floor(10 * this.getCultivationMultiplier());
    // 幸运影响修炼金币掉落
    var luckBonus = gameState.luck * 0.05;
    if (Math.random() < (0.3 + luckBonus)) {
        var goldAmt = Math.floor(Math.random()*5)+1 + Math.floor(gameState.luck*0.5);
        this.gainGold(goldAmt);
    }
    this.gainExp(gain);
    this.showFloatingText('+'+gain+' EXP', '#64ffda');
    this.updateUI();
};

/* ---- 经验/升级 ---- */
Game.prototype.gainExp = function(amt) {
    gameState.exp += amt;
    gameState.stats.totalExp += amt;
    while (gameState.exp >= gameState.expToNext) {
        gameState.exp -= gameState.expToNext;
        this.levelUp();
    }
    this.updateUI();
};

Game.prototype.levelUp = function() {
    gameState.level++;
    gameState.freePoints += 2;
    // 经验倍率1.3（原1.5）
    gameState.expToNext = Math.floor(gameState.expToNext * CONFIG.EXP_GROWTH_RATE);
    gameState.maxHp += 10;
    gameState.hp = gameState.maxHp;
    gameState.atk += 2;
    gameState.def += 1;
    gameState.spd += 1;
    if (gameState.level%5===0) { gameState.maxEnergy+=20; gameState.energy=gameState.maxEnergy; }
    this.updateRealm();
    this.showLevelUpAnim();
    this.showToast('升级！等级 '+gameState.level, 'success');
    this.checkAchievements();
};

Game.prototype.updateRealm = function() {
    var oldRealm = gameState.realm;
    var nr = REALMS[0].name;
    for (var i=REALMS.length-1; i>=0; i--) {
        if (gameState.level>=REALMS[i].level) { nr=REALMS[i].name; break; }
    }
    if (nr!==gameState.realm) {
        gameState.realm=nr;
        this.showRealmBreakAnim(nr);
    }
};

Game.prototype.gainGold = function(amt) { gameState.gold+=amt; gameState.stats.totalGold+=amt; this.updateUI(); };

/* ========== 伤害公式（防御有实际价值） ========== */
Game.prototype.calcDamage = function(atk, def, luck) {
    // 基础伤害 = atk * 1.2 / (1 + def * 0.08) + 随机波动
    var base = atk * 1.2 / (1 + def * 0.08);
    var dmg = Math.max(1, Math.floor(base + Math.random()*5 - 2));
    // 暴击：幸运*2% 概率，暴击伤害*1.5
    var crit = Math.random() < (luck||0) * 0.02;
    if (crit) {
        dmg = Math.floor(dmg * 1.5);
        gameState.stats.totalCrits++;
    }
    return { dmg:dmg, crit:crit };
};

/* ========== 敌人选择逻辑 ========== */
Game.prototype.getAvailableEnemies = function() {
    // 小怪：每5级解锁一个
    var normals = ENEMIES.filter(function(e){return !e.isBoss;});
    var maxIdx = Math.min(Math.floor(gameState.level / CONFIG.ENEMY_UNLOCK_STEP), normals.length-1);
    // 随机在已解锁的小怪中选（偏向当前等级附近的）
    var pool = normals.slice(0, maxIdx+1);
    // 加权：越新的怪权重越高
    var weights = pool.map(function(_,i){ return 1 + i; });
    var total = weights.reduce(function(a,b){return a+b;},0);
    var r = Math.random() * total;
    var acc = 0;
    for (var i=0; i<pool.length; i++) { acc+=weights[i]; if (r<=acc) return pool[i]; }
    return pool[pool.length-1];
};

Game.prototype.getAvailableBoss = function() {
    var bosses = ENEMIES.filter(function(e){return e.isBoss;});
    // Boss解锁：25级解锁幼龙，45级魔将，70级上古妖王
    var unlockLevels = [25, 45, 70];
    var available = [];
    for (var i=0; i<bosses.length && i<unlockLevels.length; i++) {
        if (gameState.level >= unlockLevels[i]) available.push(bosses[i]);
    }
    return available.length > 0 ? available[available.length-1] : null;
};

Game.prototype.scaleEnemy = function(tpl) {
    // 敌人属性随玩家等级微缩放
    var lv = gameState.level;
    var scaleHp = tpl.isBoss ? (1 + lv*0.05) : (1 + lv*0.08);
    var scaleAtk = tpl.isBoss ? (1 + lv*0.03) : (1 + lv*0.05);
    var scaleExp = 1 + lv*0.04;
    var scaleGold = 1 + lv*0.03;
    return {
        id:tpl.id, name:tpl.name, icon:tpl.icon, isBoss:tpl.isBoss,
        hp:Math.floor(tpl.hp * scaleHp),
        maxHp:Math.floor(tpl.hp * scaleHp),
        atk:Math.floor(tpl.atk * scaleAtk),
        def:tpl.def,
        exp:Math.floor(tpl.exp * scaleExp),
        gold:Math.floor(tpl.gold * scaleGold),
    };
};

/* ========== 战斗系统 ========== */
Game.prototype.startBattle = function() {
    if (gameState.currentEnemy) { this.showToast('当前有战斗进行中','warning'); return; }
    if (gameState.hp <= 0) { gameState.hp = gameState.maxHp; this.updateUI(); }

    // 判断：如果等级够且有Boss可打，50%概率遇到Boss
    var boss = this.getAvailableBoss();
    var tpl;
    if (boss && Math.random() < 0.35) {
        tpl = boss;
    } else {
        tpl = this.getAvailableEnemies();
    }

    gameState.currentEnemy = this.scaleEnemy(tpl);
    gameState.battleMode = tpl.isBoss ? 'manual' : 'auto';

    this.updateEnemyDisplay();
    this.showToast('遭遇 '+gameState.currentEnemy.name+'！', 'warning');

    if (tpl.isBoss) {
        this.addBattleLog('【Boss战】回合制战斗！选择你的行动', 'system');
        gameState.battleTurn = 'player';
        gameState.playerActionLock = false;
        this.showBattleActions(true);
    } else {
        this.addBattleLog('自动战斗中...', 'system');
        this.showBattleActions(false);
        this.autoBattle();
    }
};

/* ---- 自动战斗（小怪） ---- */
Game.prototype.autoBattle = function() {
    if (!gameState.currentEnemy || gameState.battleMode!=='auto') return;
    var self = this;
    var iv = setInterval(function() {
        if (!gameState.currentEnemy || gameState.battleMode!=='auto') { clearInterval(iv); return; }

        // 玩家攻击
        var pResult = self.calcDamage(gameState.atk, gameState.currentEnemy.def, gameState.luck);
        gameState.currentEnemy.hp -= pResult.dmg;
        self.addBattleLog('对 '+gameState.currentEnemy.name+' 造成 '+pResult.dmg+' 点伤害'+(pResult.crit?' 【暴击】':''), pResult.crit?'crit':'player-act');

        if (gameState.currentEnemy.hp<=0) { self.winBattle(); clearInterval(iv); return; }

        // 敌人攻击
        var eResult = self.calcDamage(gameState.currentEnemy.atk, gameState.def, 0);
        gameState.hp -= eResult.dmg;
        self.addBattleLog(gameState.currentEnemy.name+' 对你造成 '+eResult.dmg+' 点伤害'+(eResult.crit?' 【暴击】':''), eResult.crit?'crit':'enemy-act');

        if (gameState.hp<=0) { self.loseBattle(); clearInterval(iv); return; }

        self.updateEnemyDisplay();
        self.updateUI();
    }, CONFIG.BATTLE_TICK);
};

/* ---- 手动战斗（Boss） ---- */
Game.prototype.playerAttack = function() {
    if (gameState.playerActionLock || gameState.battleTurn!=='player') return;
    gameState.playerActionLock = true;
    var pResult = this.calcDamage(gameState.atk, gameState.currentEnemy.def, gameState.luck);
    gameState.currentEnemy.hp -= pResult.dmg;
    this.addBattleLog('你攻击了 '+gameState.currentEnemy.name+'，造成 '+pResult.dmg+' 点伤害'+(pResult.crit?' 【暴击】':''), pResult.crit?'crit':'player-act');
    this.afterPlayerAction();
};

Game.prototype.playerSkill = function() {
    if (gameState.playerActionLock || gameState.battleTurn!=='player') return;
    // 优先用火球术
    var fbLvl = gameState.skills['fireball']||0;
    if (fbLvl <= 0) { this.showToast('尚未学会火球术','warning'); gameState.playerActionLock=false; return; }
    if (gameState.energy < 10) { this.showToast('能量不足','warning'); gameState.playerActionLock=false; return; }
    gameState.playerActionLock = true;
    gameState.energy -= 10;
    var sk = SKILLS.filter(function(s){return s.id==='fireball';})[0];
    var mult = sk.effect(fbLvl);
    var dmg = Math.floor(gameState.atk * mult / (1 + gameState.currentEnemy.def*0.08));
    dmg = Math.max(1, dmg + Math.floor(Math.random()*5));
    // 幸运暴击
    var crit = Math.random() < gameState.luck * 0.02;
    if (crit) { dmg = Math.floor(dmg*1.5); gameState.stats.totalCrits++; }
    gameState.currentEnemy.hp -= dmg;
    this.addBattleLog('火球术命中 '+gameState.currentEnemy.name+'，造成 '+dmg+' 点伤害'+(crit?' 【暴击】':''), crit?'crit':'player-act');
    this.afterPlayerAction();
};

Game.prototype.playerHeal = function() {
    if (gameState.playerActionLock || gameState.battleTurn!=='player') return;
    var healLvl = gameState.skills['heal']||0;
    if (healLvl <= 0) { this.showToast('尚未学会治愈术','warning'); return; }
    if (gameState.energy < 8) { this.showToast('能量不足','warning'); return; }
    gameState.playerActionLock = true;
    gameState.energy -= 8;
    var sk = SKILLS.filter(function(s){return s.id==='heal';})[0];
    var amt = sk.effect(healLvl);
    gameState.hp = Math.min(gameState.maxHp, gameState.hp + amt);
    this.addBattleLog('治愈术恢复了 '+amt+' 点生命', 'player-act');
    this.afterPlayerAction();
};

Game.prototype.playerUseItem = function() {
    // 战斗中使用生命药水
    if (!gameState.inventory['potion_hp'] || gameState.inventory['potion_hp']<=0) {
        this.showToast('没有生命药水','warning'); return;
    }
    gameState.inventory['potion_hp']--;
    if (gameState.inventory['potion_hp']<=0) delete gameState.inventory['potion_hp'];
    var amt = Math.min(50, gameState.maxHp - gameState.hp);
    gameState.hp = Math.min(gameState.maxHp, gameState.hp+50);
    this.addBattleLog('使用生命药水，恢复 '+amt+' 点生命', 'player-act');
    this.updateUI();
};

Game.prototype.playerFlee = function() {
    if (gameState.playerActionLock || gameState.battleTurn!=='player') return;
    gameState.playerActionLock = true;
    // 逃跑概率：50% + 速度加成
    var fleeRate = 0.5 + gameState.spd * 0.01;
    if (Math.random() < fleeRate) {
        this.addBattleLog('成功逃离战斗！', 'system');
        this.showToast('逃跑成功','success');
        gameState.currentEnemy = null;
        this.showBattleActions(false);
        this.updatePreviewEnemy();
        this.updateUI();
    } else {
        this.addBattleLog('逃跑失败！', 'system');
        this.showToast('逃跑失败！','error');
        this.enemyTurn();
    }
};

Game.prototype.afterPlayerAction = function() {
    if (gameState.currentEnemy.hp <= 0) {
        this.winBattle();
        return;
    }
    this.updateEnemyDisplay();
    this.updateUI();
    // 敌人回合
    var self = this;
    setTimeout(function(){ self.enemyTurn(); }, 500);
};

Game.prototype.enemyTurn = function() {
    if (!gameState.currentEnemy) return;
    // Boss有概率蓄力
    var charging = Math.random() < 0.2;
    if (charging) {
        gameState.currentEnemy._charging = true;
        this.addBattleLog(gameState.currentEnemy.name+' 正在蓄力...', 'system');
    } else {
        var mult = gameState.currentEnemy._charging ? 1.5 : 1;
        if (gameState.currentEnemy._charging) delete gameState.currentEnemy._charging;
        var eResult = this.calcDamage(gameState.currentEnemy.atk * mult, gameState.def, 0);
        gameState.hp -= eResult.dmg;
        this.addBattleLog(gameState.currentEnemy.name+' 对你造成 '+eResult.dmg+' 点伤害'+(mult>1?' 【蓄力攻击】':'')+(eResult.crit?' 【暴击】':''), eResult.crit?'crit':'enemy-act');
    }
    if (gameState.hp<=0) { this.loseBattle(); return; }
    this.updateUI();
    gameState.battleTurn = 'player';
    gameState.playerActionLock = false;
};

Game.prototype.winBattle = function() {
    gameState.stats.totalBattles++; gameState.stats.totalWins++;
    var e = gameState.currentEnemy;
    if (e.isBoss) gameState.stats.bossKills++;
    this.gainExp(e.exp); this.gainGold(e.gold);
    // 幸运影响掉落
    if (Math.random() < gameState.luck * 0.03) {
        var bonusGold = Math.floor(e.gold * 0.5);
        gameState.gem += 1;
        this.gainGold(bonusGold);
        this.addBattleLog('幸运加成！额外获得 '+bonusGold+' 金币 + 1 宝石', 'system');
    }
    this.addBattleLog('胜利！获得 '+e.exp+' 经验, '+e.gold+' 金币', 'system');
    this.showToast('战斗胜利！', 'success');
    gameState.currentEnemy = null;
    gameState.battleMode = null;
    this.showBattleActions(false);
    this.updatePreviewEnemy();
    this.updateUI();
    this.checkAchievements();
};

Game.prototype.loseBattle = function() {
    gameState.stats.totalBattles++; gameState.stats.totalDeaths++;
    gameState.hp = Math.floor(gameState.maxHp*0.1);
    this.addBattleLog('战斗失败...', 'system');
    this.showToast('战斗失败，生命恢复10%', 'error');
    gameState.currentEnemy = null;
    gameState.battleMode = null;
    this.showBattleActions(false);
    this.updatePreviewEnemy();
    this.updateUI();
};

Game.prototype.showBattleActions = function(show) {
    var el = document.getElementById('battle-actions');
    el.style.display = show ? 'flex' : 'none';
};

/* ========== UI 更新 ========== */
Game.prototype.updateUI = function() {
    document.getElementById('gold').textContent = gameState.gold;
    document.getElementById('gem').textContent = gameState.gem;
    document.getElementById('energy').textContent = gameState.energy+'/'+gameState.maxEnergy;
    document.getElementById('realm').textContent = gameState.realm;
    document.getElementById('stat-hp').textContent = gameState.hp + '/' + gameState.maxHp;
    document.getElementById('stat-atk').textContent = gameState.atk;
    document.getElementById('stat-def').textContent = gameState.def;
    document.getElementById('stat-spd').textContent = gameState.spd;
    document.getElementById('stat-luck').textContent = gameState.luck;
    document.getElementById('stat-comp').textContent = gameState.comprehension;
    document.getElementById('free-points-num').textContent = gameState.freePoints;
    // 幸运/悟性提示
    document.getElementById('luck-tip').textContent = '(暴击'+(gameState.luck*2)+'%)';
    document.getElementById('comp-tip').textContent = '(经验+'+(gameState.comprehension*5)+'%)';
    var pct = (gameState.exp / gameState.expToNext)*100;
    document.getElementById('exp-fill').style.width = pct+'%';
    document.getElementById('exp-text').textContent = gameState.exp+'/'+gameState.expToNext;
    document.getElementById('auto-status').textContent = gameState.autoCultivate?'闭关中...':'未开启';
    // 战斗按钮文字
    var battleBtn = document.getElementById('battle-btn');
    if (gameState.currentEnemy) {
        battleBtn.disabled = true;
        battleBtn.innerHTML = '<i class="fas fa-crosshairs" style="display:block;font-size:1.4em;"></i>战斗中...';
    } else {
        battleBtn.disabled = false;
        battleBtn.innerHTML = '<i class="fas fa-crosshairs" style="display:block;font-size:1.4em;"></i>斩妖除魔';
    }
};

Game.prototype.updateEnemyDisplay = function() {
    var e = gameState.currentEnemy;
    var card = document.getElementById('enemy-card');
    if (!e) {
        this.updatePreviewEnemy();
        return;
    }
    document.getElementById('enemy-emoji').innerHTML = e.icon;
    document.getElementById('enemy-name').textContent = e.name;
    var typeTag = document.getElementById('enemy-type-tag');
    if (e.isBoss) {
        typeTag.textContent = 'BOSS';
        typeTag.style.display = 'inline';
        typeTag.style.background = 'var(--vermilion)';
        typeTag.style.color = '#fff';
        card.className = 'enemy-card boss-card';
    } else {
        typeTag.style.display = 'none';
        card.className = 'enemy-card';
    }
    var hpPct = (Math.max(0,e.hp)/e.maxHp)*100;
    document.getElementById('enemy-hp-fill').style.width = hpPct+'%';
    document.getElementById('enemy-hp-text').textContent = Math.max(0,e.hp)+'/'+e.maxHp;
};

Game.prototype.updatePreviewEnemy = function() {
    // 显示下一个可能遇到的敌人预览
    var normal = this.getAvailableEnemies();
    var boss = this.getAvailableBoss();
    var previewTarget = boss || normal;
    document.getElementById('enemy-emoji').innerHTML = previewTarget.icon;
    document.getElementById('enemy-name').textContent = previewTarget.name;
    var typeTag = document.getElementById('enemy-type-tag');
    var card = document.getElementById('enemy-card');
    if (previewTarget.isBoss) {
        typeTag.textContent = 'BOSS';
        typeTag.style.display = 'inline';
        typeTag.style.background = 'var(--vermilion)';
        typeTag.style.color = '#fff';
        card.className = 'enemy-card boss-card';
    } else {
        typeTag.style.display = 'none';
        card.className = 'enemy-card';
    }
    var scaled = this.scaleEnemy(previewTarget);
    document.getElementById('enemy-hp-fill').style.width = '100%';
    document.getElementById('enemy-hp-text').textContent = scaled.maxHp+'/'+scaled.maxHp;
};

/* ========== 技能升级 ========== */
Game.prototype.upgradeSkill = function(skillId) {
    var sk = SKILLS.filter(function(s){return s.id===skillId;})[0];
    var lvl = gameState.skills[skillId]||0;
    if (lvl>=sk.maxLevel) { this.showToast('已满级', 'warning'); return; }
    // 悟性影响升级费用折扣
    var discount = 1 - gameState.comprehension * 0.03;
    discount = Math.max(0.7, discount); // 最多7折
    var cost = Math.floor(sk.cost(lvl+1) * discount);
    if (gameState.gold<cost) { this.showToast('金币不足（需'+cost+'）', 'warning'); return; }
    gameState.gold -= cost;
    gameState.skills[skillId] = lvl+1;
    if (sk.type==='passive') {
        if (skillId==='strength') gameState.atk += sk.effect(1);
        if (skillId==='shield') gameState.def += sk.effect(1);
    }
    this.showToast(sk.name+' → Lv.'+(lvl+1), 'success');
    this.updateUI(); this.checkAchievements();
};

/* ========== 商店/物品 ========== */
Game.prototype.buyItem = function(itemId) {
    var si = SHOP_ITEMS.filter(function(i){return i.id===itemId;})[0];
    if (!si) return;
    if (si.currency==='gold'&&gameState.gold<si.price) { this.showToast('金币不足','warning'); return; }
    if (si.currency==='gem'&&gameState.gem<si.price) { this.showToast('宝石不足','warning'); return; }
    if (si.currency==='gold') gameState.gold -= si.price; else gameState.gem -= si.price;
    gameState.inventory[itemId] = (gameState.inventory[itemId]||0)+1;
    this.showToast('购买成功', 'success'); this.updateUI();
};

Game.prototype.useItem = function(itemId) {
    if (!gameState.inventory[itemId]||gameState.inventory[itemId]<=0) return;
    var it = ITEMS.filter(function(i){return i.id===itemId;})[0];
    if (!it) return;
    if (it.effect==='heal_50') { gameState.hp=Math.min(gameState.maxHp,gameState.hp+50); this.showToast('生命+50','success'); }
    if (it.effect==='energy_50') { gameState.energy=Math.min(gameState.maxEnergy,gameState.energy+50); this.showToast('能量+50','success'); }
    if (it.effect==='exp_100') { this.gainExp(100); this.showToast('经验+100','success'); }
    if (it.effect==='gem_10') { gameState.gem+=10; this.showToast('宝石+10','success'); }
    gameState.inventory[itemId]--;
    if (gameState.inventory[itemId]<=0) delete gameState.inventory[itemId];
    this.updateUI();
};

/* ========== 成就 ========== */
Game.prototype.checkAchievements = function() {
    var self = this;
    ACHIEVEMENTS.forEach(function(a) {
        if (!gameState.achievements.includes(a.id) && a.condition(gameState)) {
            gameState.achievements.push(a.id);
            if (a.reward.gold) self.gainGold(a.reward.gold);
            if (a.reward.gem) gameState.gem += a.reward.gem;
            self.showToast('成就解锁：'+a.name, 'success');
        }
    });
};

/* ========== 属性分配 ========== */
Game.prototype.assignStat = function(statId) {
    if (gameState.freePoints<1) return;
    gameState.freePoints--;
    if (statId==='hp') { gameState.maxHp+=20; gameState.hp+=20; }
    if (statId==='atk') gameState.atk+=2;
    if (statId==='def') gameState.def+=1;
    if (statId==='spd') gameState.spd+=1;
    if (statId==='luck') gameState.luck+=1;
    if (statId==='comp') gameState.comprehension+=1;
    this.showToast('属性提升', 'success'); this.updateUI(); this.showAssignModal();
};

/* ========== 模态框 ========== */
Game.prototype.showModal = function(tab) {
    var ov = document.getElementById('modal-overlay');
    var body = document.getElementById('modal-body');
    ov.style.display='flex';
    if (tab==='cultivation') { ov.style.display='none'; return; }
    if (tab==='skills') this.renderSkillsModal(body);
    if (tab==='inventory') this.renderInventoryModal(body);
    if (tab==='achievements') this.renderAchievementsModal(body);
    if (tab==='shop') this.renderShopModal(body);
    if (tab==='settings') this.renderSettingsModal(body);
};

Game.prototype.renderSkillsModal = function(body) {
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">神通广大</h3>';
    var self = this;
    SKILLS.forEach(function(sk) {
        var lvl = gameState.skills[sk.id]||0;
        var discount = Math.max(0.7, 1 - gameState.comprehension*0.03);
        var cost = Math.floor(sk.cost(lvl+1) * discount);
        var canBuy = lvl<sk.maxLevel&&gameState.gold>=cost;
        var d = document.createElement('div');
        d.className='panel-list-item';
        var extraInfo = '';
        if (sk.type==='attack') extraInfo = '｜伤害倍率: x'+sk.effect(lvl||1).toFixed(1);
        if (sk.type==='heal') extraInfo = '｜回复: '+sk.effect(lvl||1);
        if (sk.type==='cultivation') extraInfo = '｜倍率: x'+sk.effect(lvl||1).toFixed(2);
        if (sk.energyCost) extraInfo += '｜消耗: '+sk.energyCost+'能量';
        d.innerHTML='<div class="icon">'+sk.icon+'</div><div class="info"><div class="name">'+sk.name+' <span style="color:var(--gold-accent);">Lv.'+lvl+'/'+sk.maxLevel+'</span></div><div class="desc">'+sk.desc+extraInfo+'｜费用：'+cost+' 金币</div></div><div class="action" style="'+(canBuy?'':'opacity:0.4;')+'">'+(lvl>=sk.maxLevel?'已满级':'升级')+'</div>';
        d.onclick=function(){ self.upgradeSkill(sk.id); self.renderSkillsModal(body); };
        body.appendChild(d);
    });
};

Game.prototype.renderInventoryModal = function(body) {
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">玲珑宝库</h3>';
    var entries = Object.entries(gameState.inventory);
    if (entries.length===0) { body.innerHTML+='<p style="color:#999;text-align:center;padding:20px;">宝库为空</p>'; return; }
    var self = this;
    entries.forEach(function(entry) {
        var id = entry[0], qty = entry[1];
        var it = ITEMS.filter(function(i){return i.id===id;})[0];
        if (!it) return;
        var d = document.createElement('div');
        d.className='panel-list-item';
        d.innerHTML='<div class="icon">'+it.icon+'</div><div class="info"><div class="name">'+it.name+'</div><div class="desc">'+it.desc+'</div></div><div class="action">x'+qty+'｜使用</div>';
        d.onclick=function(){ self.useItem(id); self.renderInventoryModal(body); };
        body.appendChild(d);
    });
};

Game.prototype.renderAchievementsModal = function(body) {
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">功德碑</h3>';
    ACHIEVEMENTS.forEach(function(a) {
        var unlocked = gameState.achievements.includes(a.id);
        var d = document.createElement('div');
        d.className='panel-list-item';
        d.style.opacity=unlocked?'1':'0.45';
        d.style.border=unlocked?'1px solid var(--gold-accent)':'1px solid transparent';
        var rewardText = '';
        if (a.reward.gold) rewardText += a.reward.gold+'金币 ';
        if (a.reward.gem) rewardText += a.reward.gem+'宝石';
        d.innerHTML='<div class="icon">'+a.icon+'</div><div class="info"><div class="name">'+a.name+'</div><div class="desc">'+a.desc+(rewardText?' ｜奖励: '+rewardText:'')+'</div></div><div class="action">'+(unlocked?'<span style="color:var(--gold-accent);">已解锁</span>':'未解锁')+'</div>';
        body.appendChild(d);
    });
};

Game.prototype.renderShopModal = function(body) {
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">灵坊市集</h3>';
    var grid=document.createElement('div'); grid.className='shop-grid';
    var self = this;
    SHOP_ITEMS.forEach(function(si) {
        var it = ITEMS.filter(function(i){return i.id===si.id;})[0];
        var canBuy = si.currency==='gold'?gameState.gold>=si.price:gameState.gem>=si.price;
        var d=document.createElement('div'); d.className='shop-item';
        d.innerHTML='<div class="item-icon">'+it.icon+'</div><div class="shop-item-name" style="font-weight:bold;margin-bottom:4px;">'+it.name+'</div><div class="price">'+(si.currency==='gold'?'<i class="fas fa-coins"></i>':'<i class="fas fa-gem"></i>')+' '+si.price+'</div>';
        d.style.opacity=canBuy?'1':'0.5';
        d.onclick=function(){ self.buyItem(si.id); self.renderShopModal(body); };
        grid.appendChild(d);
    });
    body.appendChild(grid);
};

Game.prototype.renderSettingsModal = function(body) {
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">仙机设置</h3>';
    var self = this;
    var settingsList = [
        {id:'sound',name:'音效',desc:'开启游戏音效'},
        {id:'autoSave',name:'自动保存',desc:'每30秒自动保存'},
        {id:'animations',name:'动画效果',desc:'开启UI动画'}
    ];
    settingsList.forEach(function(s) {
        var d=document.createElement('div'); d.className='panel-list-item';
        d.innerHTML='<div class="info"><div class="name">'+s.name+'</div><div class="desc">'+s.desc+'</div></div><div class="action"><input type="checkbox" '+(gameState.settings[s.id]?'checked':'')+' onchange="game.toggleSetting(\''+s.id+'\')" style="width:18px;height:18px;cursor:pointer;"></div>';
        body.appendChild(d);
    });
    var saveBtn=document.createElement('button'); saveBtn.className='btn-small'; saveBtn.innerHTML='<i class="fas fa-save"></i> 手动保存'; saveBtn.onclick=function(){ self.saveGame(); }; body.appendChild(saveBtn);
    var resetBtn=document.createElement('button'); resetBtn.className='btn-small'; resetBtn.innerHTML='<i class="fas fa-trash-alt"></i> 重置游戏';
    resetBtn.style.borderColor='var(--danger)'; resetBtn.style.color='var(--danger)';
    resetBtn.onclick=function(){ if(confirm('确定重置？此操作不可撤销！')){ localStorage.removeItem(CONFIG.SAVE_KEY); location.reload(); } };
    body.appendChild(resetBtn);
};

Game.prototype.showAssignModal = function() {
    var ov=document.getElementById('modal-overlay');
    var body=document.getElementById('modal-body');
    ov.style.display='flex';
    body.innerHTML='<h3 style="font-family:\'Ma Shan Zheng\',cursive;font-size:1.5em;margin-bottom:15px;">分配属性点</h3>';
    body.innerHTML+='<p>可分配点数：<strong style="color:var(--vermilion);">'+gameState.freePoints+'</strong></p>';
    var self = this;
    var statDefs = [
        {id:'hp',name:'生命',desc:'每点+20生命'},
        {id:'atk',name:'攻击',desc:'每点+2攻击（影响伤害）'},
        {id:'def',name:'防御',desc:'每点+1防御（百分比减伤）'},
        {id:'spd',name:'速度',desc:'每点+1速度（影响逃跑率）'},
        {id:'luck',name:'幸运',desc:'每点+1幸运（暴击+'+2+'%，掉落加成）'},
        {id:'comp',name:'悟性',desc:'每点+1悟性（经验+'+5+'%，技能折扣-'+3+'%）'}
    ];
    statDefs.forEach(function(s) {
        var d=document.createElement('div'); d.className='panel-list-item';
        d.innerHTML='<div class="info"><div class="name">'+s.name+'</div><div class="desc">'+s.desc+'</div></div><div class="action" style="'+(gameState.freePoints>0?'color:var(--gold-accent);':'opacity:0.4;')+'">升级</div>';
        d.onclick=function(){ self.assignStat(s.id); };
        body.appendChild(d);
    });
};

/* ========== 事件绑定 ========== */
Game.prototype.bindEvents = function() {
    var self = this;
    document.getElementById('cultivate-btn').onclick=function(){ self.cultivate(); };
    document.getElementById('auto-cultivate-btn').onclick=function(){
        gameState.autoCultivate=!gameState.autoCultivate; self.updateUI();
        self.showToast(gameState.autoCultivate?'闭关已开启':'闭关已关闭','success');
    };
    document.getElementById('battle-btn').onclick=function(){
        self.startBattle();
    };
    // Boss战斗操作
    document.getElementById('ba-attack').onclick=function(){ self.playerAttack(); };
    document.getElementById('ba-skill').onclick=function(){ self.playerSkill(); };
    document.getElementById('ba-item').onclick=function(){ self.playerUseItem(); };
    document.getElementById('ba-flee').onclick=function(){ self.playerFlee(); };
    document.getElementById('assign-stats-btn').onclick=function(){ self.showAssignModal(); };
    document.querySelectorAll('.nav-talisman').forEach(function(btn) {
        btn.onclick=function(){
            document.querySelectorAll('.nav-talisman').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            self.showModal(btn.dataset.tab);
        };
    });
    document.getElementById('modal-close').onclick=function(){ document.getElementById('modal-overlay').style.display='none'; };
    document.getElementById('modal-overlay').onclick=function(e){ if(e.target===document.getElementById('modal-overlay')) e.target.style.display='none'; };
};

/* ========== 循环 ========== */
Game.prototype.startLoops = function() {
    var self = this;
    // 自动闭关
    setInterval(function() {
        if (gameState.autoCultivate&&gameState.energy>0) self.cultivate();
    }, CONFIG.AUTO_CULTIVATE_INTERVAL);
    // 能量恢复
    setInterval(function() {
        if (gameState.energy<gameState.maxEnergy) { gameState.energy=Math.min(gameState.maxEnergy,gameState.energy+1); self.updateUI(); }
    }, CONFIG.ENERGY_REGEN_RATE*1000);
    // 自动保存（静默）
    setInterval(function() {
        if (gameState.settings.autoSave) self.saveGame(true);
    }, CONFIG.SAVE_INTERVAL);
    // 在线心跳
    setInterval(function(){ gameState.stats.lastOnlineTime=Date.now(); }, 10000);
};

/* ========== 工具 ========== */
Game.prototype.toggleSetting = function(id) {
    gameState.settings[id]=!gameState.settings[id];
    var nameMap = {sound:'音效', autoSave:'自动保存', animations:'动画效果'};
    this.showToast((nameMap[id]||id)+' '+(gameState.settings[id]?'已开启':'已关闭'),'success');
};

Game.prototype.showToast = function(msg, type) {
    var c=document.getElementById('toast-container');
    var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    if (type==='error') t.style.borderColor='var(--danger)';
    if (type==='warning') t.style.borderColor='var(--warning)';
    c.appendChild(t); setTimeout(function(){ t.remove(); },3000);
};

Game.prototype.showFloatingText = function(text, color) {
    if (!gameState.settings.animations) return;
    var el=document.createElement('div'); el.className='floating-text'; el.textContent=text; el.style.color=color;
    el.style.left='50%'; el.style.top='50%'; el.style.transform='translate(-50%,-50%)';
    document.querySelector('.avatar-frame').appendChild(el);
    setTimeout(function(){ el.remove(); },1000);
};

Game.prototype.showLevelUpAnim = function() {
    if (!gameState.settings.animations) return;
    var av=document.querySelector('.avatar-frame');
    av.style.transform='scale(1.1)'; av.style.transition='transform 0.3s';
    setTimeout(function(){ av.style.transform='scale(1)'; },300);
};

Game.prototype.showRealmBreakAnim = function(realmName) {
    var overlay = document.getElementById('realm-break-overlay');
    var textEl = document.getElementById('realm-break-text');
    var subEl = document.getElementById('realm-break-sub');
    textEl.textContent = '突破 · ' + realmName;
    subEl.textContent = '仙途漫漫，道阻且长';
    overlay.classList.add('active');
    setTimeout(function(){
        overlay.classList.remove('active');
    }, 2500);
};

Game.prototype.addBattleLog = function(msg, cls) {
    var log=document.getElementById('battle-log');
    var m=document.createElement('div'); m.className='battle-msg '+(cls||''); m.textContent=msg;
    log.appendChild(m); log.scrollTop=log.scrollHeight;
    while(log.children.length>20) log.removeChild(log.firstChild);
};

/* ========== 启动 ========== */
var game;
document.addEventListener('DOMContentLoaded', function() {
    game = new Game();
    window.game = game;
});
</script>
